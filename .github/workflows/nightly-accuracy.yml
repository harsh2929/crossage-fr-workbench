name: Nightly Accuracy

# TO-2: the recall-first cross-age quality claim had no automated guardrail —
# the real-model accuracy gate (dataset_regression_gates with a real report)
# never ran in CI, because the report is produced only by a manual benchmark
# script. This nightly runs the real engine (no CROSSAGE_FORCE_FALLBACK) over the
# small, auto-downloadable public slices (CALFW/CPLFW) and enforces the
# precision / recall / wrong-identity gate on the produced report. It runs on a
# schedule (and on demand) rather than on PRs because it depends on external
# dataset/model downloads and is slower than the unit suite.

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-accuracy
  cancel-in-progress: true

jobs:
  accuracy:
    name: Real-model public dataset gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: ${{ github.workspace }}
      # Deliberately NOT setting CROSSAGE_FORCE_FALLBACK — this lane exercises the
      # real InsightFace embedding engine end to end.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python production dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --require-hashes -r requirements-production.lock.txt

      - name: Cache InsightFace model packs
        uses: actions/cache@v4
        with:
          path: ~/.insightface
          key: insightface-antelopev2-v1

      - name: Cache downloaded public datasets
        uses: actions/cache@v4
        with:
          path: benchmarks/public-data/downloads
          key: public-datasets-calfw-cplfw-v1

      - name: Download auto-accessible public datasets
        run: python benchmarks/download_public_datasets.py calfw cplfw

      - name: Prepare reproducible slices
        run: |
          python benchmarks/prepare_public_dataset_slice.py calfw --max-identities 32 --images-per-identity 4 --extra-identities 8 --force
          python benchmarks/prepare_public_dataset_slice.py cplfw --max-identities 32 --images-per-identity 3 --extra-identities 8 --force

      - name: Run real-model benchmark
        run: |
          python benchmarks/run_public_dataset_benchmarks.py \
            --datasets calfw cplfw \
            --packs antelopev2 \
            --baseline-pack antelopev2 \
            --candidate-pack antelopev2 \
            --require-real-data

      - name: Enforce accuracy regression gate
        env:
          VINTRACE_DATASET_GATE_REPORT: benchmarks/results/public-dataset-benchmark-latest.json
        run: python tests/dataset_regression_gates.py

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-dataset-benchmark-report
          path: |
            benchmarks/results/public-dataset-benchmark-latest.json
            benchmarks/results/public-dataset-benchmark-latest.md
          if-no-files-found: warn
