name: QA

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  qa:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CROSSAGE_FORCE_FALLBACK: "1"
      PYTHONPATH: ${{ github.workspace }}
      VINTRACE_BUILD_SHA: ${{ github.sha }}
      VINTRACE_BUILD_REF: ${{ github.ref_name }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python production dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # BRS-1: install from the fully pinned + hashed lock so builds are
          # reproducible and tamper-evident. The human-edited requirements*.txt
          # remain the source spec; regenerate with:
          #   uv pip compile requirements-production.txt --generate-hashes \
          #     --universal --python-version 3.11 -o requirements-production.lock.txt
          python -m pip install --require-hashes -r requirements-production.lock.txt

      - name: Install Playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: Typecheck and build UI
        run: npm run build

      - name: Localization contract
        run: npm run test:localization

      - name: Command contract
        run: python tests/command_contract.py

      - name: Pipeline smoke
        run: python tests/pipeline_smoke.py

      - name: Edge-case suite
        run: python tests/edge_cases.py

      - name: Filesystem chaos suite
        run: npm run test:filesystem-chaos

      - name: Workspace backup roundtrip
        run: npm run test:backup-roundtrip

      - name: Public dataset benchmark harness
        run: npm run test:dataset-benchmark

      - name: Dataset regression gates
        run: npm run test:dataset-gates

      - name: Model downloader failure modes
        run: npm run test:model-downloader

      # TO-1/MS-6: the rest of the suite runs CROSSAGE_FORCE_FALLBACK=1, so the
      # real ONNX Safe-Mode gate had no behavioural coverage. This step runs the
      # bundled model for real (no download needed — it ships in the repo).
      - name: Real Safe-Mode model inference (no fallback)
        env:
          CROSSAGE_FORCE_FALLBACK: ""
        run: python tests/safety_model_inference.py

      - name: MCP smoke
        run: python tests/mcp_smoke.py

      - name: MCP redaction & model integrity
        run: python tests/mcp_redaction.py

      - name: Clean workspace simulation
        run: npm run test:clean

      - name: Accuracy benchmark
        run: python tests/accuracy_benchmark.py

      - name: Scale benchmark
        env:
          VINTRACE_SCALE_BENCH_FILES: "100000"
        run: python tests/scale_benchmark.py

      - name: Performance budget
        run: npm run test:perf-budget

      - name: Update feed dry run
        run: npm run update:dry-run

      - name: Package artifact configuration
        run: npm run package:check

      - name: Release check
        run: npm run release:check

      - name: Playwright UI
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Playwright button regression
        run: xvfb-run --auto-servernum npm run test:e2e:buttons

      - name: Playwright localization layout
        run: xvfb-run --auto-servernum npm run test:e2e:i18n

      - name: Playwright IPC security fuzz
        run: xvfb-run --auto-servernum npm run test:e2e:ipc

      - name: Playwright accessibility keyboard
        run: xvfb-run --auto-servernum npm run test:e2e:a11y

      - name: Playwright memory soak
        run: xvfb-run --auto-servernum npm run test:e2e:soak
