name: Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional GitHub Release tag to publish installer/update metadata to, for example v0.1.0"
        required: false
        type: string
      draft:
        description: "Create or update the release as a draft"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      VINTRACE_BUILD_SHA: ${{ github.sha }}
      VINTRACE_BUILD_REF: ${{ github.ref_name }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python production dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-production.txt

      - name: Run backend smoke tests
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tests/pipeline_smoke.py
          python tests/edge_cases.py
          python tests/clean_workspace_smoke.py
          python tests/accuracy_benchmark.py

      - name: Validate update feed and release checks
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          npm run update:dry-run
          npm run release:check

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - name: Validate packaged artifacts
        env:
          VINTRACE_PACKAGE_REQUIRED: "1"
          VINTRACE_PACKAGE_PLATFORM: "win32"
        run: npm run package:check

      - name: Smoke test packaged backend sidecar
        shell: pwsh
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          CROSSAGE_WORKSPACE: ${{ runner.temp }}\crossage-workspace
        run: |
          $backend = Join-Path $PWD "backend-dist\crossage-backend\crossage-backend.exe"
          if (!(Test-Path $backend)) {
            $backend = Get-ChildItem -Path (Join-Path $PWD "backend-dist") -Filter "crossage-backend.exe" -Recurse -File | Select-Object -First 1 -ExpandProperty FullName
          }
          if (!$backend -or !(Test-Path $backend)) {
            throw "Missing packaged backend under backend-dist"
          }
          $line = "" | & $backend | Select-Object -Last 1
          $json = $line | ConvertFrom-Json
          if ($json.ready -ne $true) {
            throw "Packaged backend did not report ready=true"
          }
          if (!$json.state.modelSetup.packages -or $json.state.modelSetup.packages.Count -lt 2) {
            throw "Model setup packages were not exposed by packaged backend"
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Vintrace-Windows-Installer
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

      - name: Publish installer to GitHub Release
        if: ${{ inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Vintrace ${{ inputs.release_tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
