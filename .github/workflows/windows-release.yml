name: Windows Release

on:
  workflow_dispatch:

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python production dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-production.txt

      - name: Run backend smoke tests
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tests/pipeline_smoke.py
          python tests/edge_cases.py

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - name: Smoke test packaged backend sidecar
        shell: pwsh
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          CROSSAGE_WORKSPACE: ${{ runner.temp }}\crossage-workspace
        run: |
          $backend = Join-Path $PWD "backend-dist\crossage-backend.exe"
          if (!(Test-Path $backend)) {
            throw "Missing packaged backend at $backend"
          }
          $line = "" | & $backend | Select-Object -Last 1
          $json = $line | ConvertFrom-Json
          if ($json.ready -ne $true) {
            throw "Packaged backend did not report ready=true"
          }
          if (!$json.state.modelSetup.packages -or $json.state.modelSetup.packages.Count -lt 2) {
            throw "Model setup packages were not exposed by packaged backend"
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CrossAge-FR-Windows-Installer
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
