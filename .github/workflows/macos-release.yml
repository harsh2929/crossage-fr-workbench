name: macOS Unsigned Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional GitHub Release tag to publish the unsigned DMG/ZIP to, for example v0.1.0"
        required: false
        type: string
      draft:
        description: "Create or update the release as a draft"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-macos-unsigned:
    name: Build unsigned macOS DMG
    runs-on: macos-latest
    env:
      VINTRACE_BUILD_SHA: ${{ github.sha }}
      VINTRACE_BUILD_REF: ${{ github.ref_name }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python production dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # BRS-1: install from the pinned + hashed lock (reproducible/tamper-evident).
          python -m pip install --require-hashes -r requirements-production.lock.txt

      - name: Run backend smoke tests
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tests/pipeline_smoke.py
          python tests/clean_workspace_smoke.py
          python tests/accuracy_benchmark.py
          python tests/dataset_regression_gates.py

      - name: Validate release checks
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          npm run update:dry-run
          npm run release:check

      - name: Build unsigned macOS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac:unsigned

      - name: Generate release metadata
        run: npm run release:artifacts

      - name: Validate packaged artifacts
        env:
          VINTRACE_PACKAGE_REQUIRED: "1"
          VINTRACE_PACKAGE_PLATFORM: "darwin"
        run: npm run package:check

      - name: Smoke test packaged backend sidecar
        env:
          CROSSAGE_FORCE_FALLBACK: "1"
          CROSSAGE_WORKSPACE: ${{ runner.temp }}/vintrace-workspace
        run: |
          backend="$PWD/backend-dist/crossage-backend/crossage-backend"
          if [ ! -x "$backend" ]; then
            backend="$(find "$PWD/backend-dist" -type f -name crossage-backend | head -n 1)"
          fi
          test -n "$backend"
          chmod +x "$backend"
          line="$(printf '\n' | "$backend" | tail -n 1)"
          python - <<'PY' "$line"
          import json
          import sys
          payload = json.loads(sys.argv[1])
          assert payload["ready"] is True
          assert len(payload["state"]["modelSetup"]["packages"]) >= 2
          PY

      - name: Smoke test packaged desktop app
        env:
          CROSSAGE_ALLOW_MULTI_INSTANCE: "1"
          CROSSAGE_FORCE_FALLBACK: "1"
        run: npm run test:e2e:packaged

      - name: Upload unsigned macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: Vintrace-macOS-Unsigned
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
            dist/SHA256SUMS.txt
            dist/vintrace-sbom.json
            dist/vintrace-provenance.json

      - name: Publish unsigned macOS installer to GitHub Release
        if: ${{ inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Vintrace ${{ inputs.release_tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
            dist/SHA256SUMS.txt
            dist/vintrace-sbom.json
            dist/vintrace-provenance.json

      - name: Verify published release assets
        if: ${{ inputs.release_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:verify -- --repo "${{ github.repository }}" --tag "${{ inputs.release_tag }}" --platform darwin --full --require-release-metadata
