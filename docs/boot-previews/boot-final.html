<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vintrace — Opening (Aurora Instrument)</title>
<style>
  /* ============================================================
     "Aurora Instrument" — the shipped synthesis.
     Base: Aurora Silk (restraint, frosted card, colour discipline).
     Graft: Precision Ring's instrument identity (one slow conic ring +
     faint sweep hugging the badge, a live pulsing status dot, a whisper
     static forensic grid). Strictly transform/opacity motion only.
     ============================================================ */
  :root {
    --text: #f6f7fb;
    --text-72: rgba(246, 247, 251, 0.72);
    --text-56: rgba(246, 247, 251, 0.56);
    --text-40: rgba(246, 247, 251, 0.40);
    --accent: #007aff;
    --cyan: #64d2ff;
    --violet: #bf5af2;
    --ease-soft: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-inout: cubic-bezier(0.4, 0, 0.2, 1);
    --boot-fill: 0.18;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    background:
      radial-gradient(120% 85% at 50% 32%, rgba(10, 15, 24, 0) 40%, rgba(2, 4, 9, 0.55) 100%),
      linear-gradient(180deg, #101622 0%, #080b12 58%, #03050a 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    isolation: isolate;
  }

  /* ---------- THE ONE AURORA (single soft blurred ambient layer) ----------
     Drifts via translate3d and breathes in opacity ONLY. Blur radius / size
     are static. The single luminous gesture. */
  .aurora {
    position: absolute;
    z-index: -3;
    top: 50%;
    left: 50%;
    width: 130vmax;
    height: 90vmax;
    margin-top: -45vmax;
    margin-left: -65vmax;
    pointer-events: none;
    border-radius: 50%;
    background:
      radial-gradient(60% 55% at 38% 40%, rgba(100, 210, 255, 0.42) 0%, rgba(100, 210, 255, 0) 60%),
      radial-gradient(55% 50% at 64% 58%, rgba(0, 122, 255, 0.40) 0%, rgba(0, 122, 255, 0) 62%),
      radial-gradient(48% 46% at 52% 30%, rgba(191, 90, 242, 0.16) 0%, rgba(191, 90, 242, 0) 66%);
    filter: blur(72px);
    opacity: 0.5;
    will-change: transform, opacity;
    transform: translate3d(-6%, 4%, 0) rotate(-8deg);
    animation:
      auroraDrift 18s var(--ease-inout) infinite alternate,
      auroraBreathe 7s var(--ease-inout) infinite alternate;
  }
  @keyframes auroraDrift {
    0%   { transform: translate3d(-7%, 5%, 0) rotate(-9deg) scale(1.0); }
    100% { transform: translate3d(7%, -5%, 0) rotate(5deg) scale(1.08); }
  }
  @keyframes auroraBreathe {
    0%   { opacity: 0.34; }
    100% { opacity: 0.62; }
  }

  /* whisper-faint static forensic grid — never animated, masked tightly */
  .grid {
    position: absolute;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(246, 247, 251, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(246, 247, 251, 0.035) 1px, transparent 1px);
    background-size: 46px 46px;
    background-position: center;
    -webkit-mask-image: radial-gradient(circle at 50% 46%, #000 0%, #000 22%, transparent 58%);
            mask-image: radial-gradient(circle at 50% 46%, #000 0%, #000 22%, transparent 58%);
  }

  /* faint vignette so the aurora reads as light through glass — static */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(120% 90% at 50% 42%, transparent 38%, rgba(3, 5, 10, 0.55) 100%);
  }

  /* ---------- FROSTED CARD ---------- */
  .card {
    position: relative;
    width: 384px;
    max-width: calc(100vw - 48px);
    padding: 40px 38px 34px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.025) 100%);
    border: 1px solid rgba(255, 255, 255, 0.10);
    /* 18px (vs Aurora's 28px): cheaper to recomposite against the moving aurora */
    -webkit-backdrop-filter: blur(18px) saturate(135%);
    backdrop-filter: blur(18px) saturate(135%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.10) inset,
      0 0 0 1px rgba(0, 0, 0, 0.20),
      0 30px 80px -20px rgba(0, 0, 0, 0.65),
      0 8px 24px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 14px, 0) scale(0.985);
    animation: cardIn 1s var(--ease-soft) 0.05s forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }

  /* hairline inner top highlight (masked rim) */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 22px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 32%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* ---------- MARK + INSTRUMENT RING ---------- */
  .mark {
    position: relative;
    width: 58px;
    height: 58px;
    margin: 4px auto 26px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    background: linear-gradient(160deg, #0a84ff 0%, #007aff 48%, #0064d6 100%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.45) inset,
      0 -1px 1px rgba(0, 30, 80, 0.5) inset,
      0 10px 24px -8px rgba(0, 122, 255, 0.55),
      0 2px 6px rgba(0, 0, 0, 0.4);
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0) scale(0.9);
    animation:
      markIn 0.9s var(--ease-soft) 0.18s forwards,
      markBreathe 4.6s var(--ease-inout) 1.3s infinite;
  }
  @keyframes markIn  { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }
  @keyframes markBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.028); } }

  /* top specular highlight on the badge (jewel-like, static) */
  .mark::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: radial-gradient(120% 80% at 50% 0%, rgba(255, 255, 255, 0.30), transparent 60%);
    pointer-events: none;
  }

  /* faint static dial track — the instrument base */
  .ring-base {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(246, 247, 251, 0.06);
    box-shadow: inset 0 0 0 1px rgba(0, 122, 255, 0.04);
    pointer-events: none;
  }

  /* outer thin conic ring — rotates slowly (transform only) */
  .ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
    background: conic-gradient(
      from 0deg,
      rgba(100, 210, 255, 0) 0deg,
      rgba(100, 210, 255, 0) 42deg,
      rgba(0, 122, 255, 0.85) 130deg,
      rgba(100, 210, 255, 1) 205deg,
      rgba(0, 122, 255, 0.30) 255deg,
      rgba(100, 210, 255, 0) 360deg
    );
    animation: ringSpin 14s linear infinite;
  }
  @keyframes ringSpin { to { transform: rotate(360deg); } }

  /* single faint scanner sweep — orbits the badge slowly */
  .sweep {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform;
    animation: sweepSpin 7s linear infinite;
  }
  .sweep::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50%;
    height: 1px;
    transform-origin: left center;
    background: linear-gradient(90deg, rgba(100, 210, 255, 0.5) 0%, rgba(100, 210, 255, 0) 86%);
  }
  @keyframes sweepSpin { to { transform: rotate(360deg); } }

  .mark svg { position: relative; z-index: 1; display: block; }

  /* ---------- TEXT ---------- */
  .name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.30s forwards;
  }
  .status {
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--text-72);
    margin: 0 0 5px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.38s forwards;
  }
  /* live cyan status dot — pulses (transform + opacity) as the "is-alive" signal */
  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px rgba(100, 210, 255, 0.85);
    will-change: transform, opacity;
    animation: dotPulse 1.9s var(--ease-inout) infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.45; transform: scale(0.82); }
    50%      { opacity: 1;    transform: scale(1); }
  }
  .sub {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: var(--text-56);
    margin: 0 0 26px;
    min-height: 15px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.46s forwards;
  }
  @keyframes textIn { to { opacity: 1; transform: translate3d(0, 0, 0); } }

  /* ---------- PROGRESS (scaleX via transform, the one allowed exception) ---------- */
  .progress {
    position: relative;
    height: 4px;
    width: 100%;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.09);
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    opacity: 0;
    animation: textIn 0.8s var(--ease-soft) 0.54s forwards;
  }
  .progress .fill {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    border-radius: 999px;
    background: linear-gradient(90deg, #007aff 0%, #64d2ff 100%);
    box-shadow: 0 0 12px rgba(100, 210, 255, 0.45);
    will-change: transform;
    transform: scaleX(var(--boot-fill, 0.18));
    transition: transform 1.1s var(--ease-soft);
  }

  /* ---------- STEP CHIPS ---------- */
  .chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 22px;
    opacity: 0;
    animation: textIn 0.8s var(--ease-soft) 0.62s forwards;
  }
  .chip {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text-40);
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.07);
    background: rgba(255, 255, 255, 0.025);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.5s var(--ease-inout), border-color 0.5s var(--ease-inout), background-color 0.5s var(--ease-inout);
  }
  .chip .tick {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.45;
    /* tick "pop" on done = transform:scale (compositor-friendly micro-interaction) */
    transform: scale(0.7);
    transition: opacity 0.5s var(--ease-inout), transform 0.5s var(--ease-soft);
  }
  .chip.done {
    color: var(--cyan);
    border-color: rgba(100, 210, 255, 0.30);
    background: rgba(0, 122, 255, 0.12);
  }
  .chip.done .tick { opacity: 1; transform: scale(1); }

  /* ---------- ERROR STATE ---------- */
  .boot-failed .ring,
  .boot-failed .sweep { display: none; }
  .boot-failed .status .dot {
    background: #ff6b62;
    box-shadow: 0 0 8px rgba(255, 107, 98, 0.7);
    animation: none;
    opacity: 1;
  }
  .boot-failed .progress .fill { background: linear-gradient(90deg, #ff453a, #ff9f0a); }

  /* ---------- REDUCED MOTION ---------- */
  @media (prefers-reduced-motion: reduce) {
    .aurora {
      animation: auroraBreathe 6s var(--ease-inout) infinite alternate;
      transform: translate3d(0, 0, 0) rotate(-4deg);
    }
    .ring, .sweep { animation: none; }
    .mark { animation: none; }
    .status .dot { animation: dotPulse 2.6s var(--ease-inout) infinite; }
    .card, .mark, .name, .status, .sub, .progress, .chips {
      opacity: 1;
      transform: none;
    }
    .card { animation: none; }
    .name, .status, .sub, .progress, .chips { animation: none; }
  }
</style>
</head>
<body>
  <div class="stage boot">
    <div class="aurora" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="card" role="status" aria-live="polite" aria-label="Opening Vintrace">
      <div class="mark" aria-hidden="true">
        <span class="ring-base"></span>
        <span class="ring"></span>
        <span class="sweep"></span>
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6 L15 23 L25 6" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1 class="name">Vintrace</h1>
      <p class="status"><span class="dot"></span><span id="status-text">Opening app</span></p>
      <p class="sub">Loading private on-device review data.</p>

      <div class="progress" aria-hidden="true">
        <div class="fill" id="fill"></div>
      </div>

      <div class="chips" aria-hidden="true">
        <span class="chip done" id="chip-0"><span class="tick"></span>Shell</span>
        <span class="chip" id="chip-1"><span class="tick"></span>Engine</span>
        <span class="chip" id="chip-2"><span class="tick"></span>App folder</span>
      </div>
    </main>
  </div>

  <script>
    // Standalone preview driver only — the real app drives --boot-fill / .done from React state.
    (function () {
      var root = document.documentElement;
      var chips = [document.getElementById('chip-1'), document.getElementById('chip-2')];
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      function set(v) { root.style.setProperty('--boot-fill', String(v)); }
      set(0.18);
      if (reduce) { set(0.94); chips.forEach(function (c) { c.classList.add('done'); }); return; }
      setTimeout(function () { set(0.46); }, 700);
      setTimeout(function () { set(0.72); chips[0].classList.add('done'); }, 1700);
      setTimeout(function () { set(0.94); chips[1].classList.add('done'); }, 2900);
    })();
  </script>
</body>
</html>
