<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vintrace — Opening</title>
<style>
  /* ============================================================
     Vintrace boot screen — concept "Liquid Orbit"
     - Animates ONLY transform + opacity (+ the one allowed
       progress bar transition, done via transform: scaleX()).
     - <= 10 animated nodes, will-change only on movers.
     - One soft ambient blurred layer; it only DRIFTS.
     ============================================================ */

  :root{
    --ink:        #f6f7fb;
    --ink-72:     rgba(246,247,251,.72);
    --ink-56:     rgba(246,247,251,.56);
    --ink-40:     rgba(246,247,251,.40);
    --blue:       #007aff;
    --cyan:       #64d2ff;
    --violet:     #bf5af2;
    --hairline:   rgba(255,255,255,.10);
    --ease-soft:  cubic-bezier(0.22,1,0.36,1);
    --ease-std:   cubic-bezier(0.4,0,0.2,1);
    --font: -apple-system, "SF Pro Display", "SF Pro Text", system-ui,
            BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    font-family:var(--font);
    color:var(--ink);
    background:
      radial-gradient(ellipse at 50% 30%, rgba(0,122,255,.10), transparent 46%),
      radial-gradient(ellipse at 78% 16%, rgba(100,210,255,.08), transparent 40%),
      linear-gradient(180deg,#101622 0%,#080b12 58%,#03050a 100%);
    min-height:100vh;
    display:grid;
    place-items:center;
    overflow:hidden;
    isolation:isolate;
    position:relative;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---------- ambient blurred light (the ONE blurred drifter) ---------- */
  .ambient{
    position:absolute;
    z-index:-2;
    top:50%; left:50%;
    width:760px; height:760px;
    margin:-380px 0 0 -380px;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 42%, rgba(0,122,255,.28), transparent 58%),
      radial-gradient(circle at 58% 60%, rgba(100,210,255,.16), transparent 62%);
    filter:blur(60px);
    opacity:.9;
    will-change:transform;
    animation:ambient-drift 14s var(--ease-std) infinite alternate;
  }
  @keyframes ambient-drift{
    from{ transform:translate3d(-26px,-14px,0) scale(1); }
    to  { transform:translate3d(28px,18px,0)  scale(1.06); }
  }

  /* fine static vignette + grid — NOT animated */
  .vignette{
    position:absolute; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(ellipse at 50% 38%, transparent 52%, rgba(0,0,0,.42) 100%);
  }

  /* ================= stage (the orbit system) ================= */
  .stage{
    position:relative;
    width:300px; height:300px;
    display:grid;
    place-items:center;
    margin-bottom:6px;
    /* staggered entrance */
    opacity:0;
    transform:translate3d(0,14px,0) scale(.96);
    animation:rise .9s var(--ease-soft) .05s forwards;
  }

  /* static refractive halo — soft depth, no animation */
  .halo{
    position:absolute;
    width:236px; height:236px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%,
      rgba(100,210,255,.10), rgba(0,122,255,.06) 42%, transparent 70%);
    box-shadow:
      inset 0 0 60px rgba(100,210,255,.10),
      0 30px 90px rgba(0,0,0,.45);
  }
  .halo::after{ /* hairline ring */
    content:"";
    position:absolute; inset:0;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.06);
    -webkit-mask:radial-gradient(circle, transparent 67%, #000 70%);
            mask:radial-gradient(circle, transparent 67%, #000 70%);
  }

  /* the luminous core orb — breathes via scale + opacity */
  .core{
    position:absolute;
    width:120px; height:120px;
    border-radius:50%;
    background:
      radial-gradient(circle at 42% 38%, #aee9ff 0%, var(--cyan) 24%, var(--blue) 56%, #013a8a 100%);
    box-shadow:
      inset 0 0 22px rgba(255,255,255,.45),
      inset 0 -10px 28px rgba(1,40,120,.6),
      0 0 60px rgba(0,122,255,.42);
    will-change:transform,opacity;
    animation:breathe 4.2s var(--ease-std) infinite alternate;
  }
  .core::before{ /* specular highlight, static */
    content:"";
    position:absolute; left:24%; top:18%;
    width:38%; height:30%;
    border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.85), transparent 70%);
    opacity:.7;
  }
  @keyframes breathe{
    from{ transform:scale(.97); opacity:.92; }
    to  { transform:scale(1.05); opacity:1; }
  }

  /* orbit wrappers — pure rotation; the light point is offset on the radius */
  .orbit{
    position:absolute;
    border-radius:50%;
    will-change:transform;
  }
  .orbit > .pt{
    position:absolute;
    top:50%; left:50%;
    width:9px; height:9px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 38%, #ffffff, var(--cyan) 55%, var(--blue) 100%);
    box-shadow:0 0 12px rgba(100,210,255,.85), 0 0 24px rgba(0,122,255,.5);
  }

  .orbit-1{ width:236px; height:236px; animation:spin 9s linear infinite; }
  .orbit-1 > .pt{ transform:translate(-50%,-50%) translate(118px,0); }

  .orbit-2{ width:178px; height:178px; animation:spin 13s linear infinite reverse; }
  .orbit-2 > .pt{
    transform:translate(-50%,-50%) translate(89px,0);
    width:7px; height:7px;
    background:radial-gradient(circle at 40% 38%, #ffffff, var(--blue) 60%, #0a3a8a 100%);
    box-shadow:0 0 10px rgba(0,122,255,.8);
  }

  .orbit-3{ width:288px; height:288px; animation:spin 18s linear infinite; }
  .orbit-3 > .pt{
    transform:translate(-50%,-50%) translate(144px,0);
    width:5px; height:5px;
    background:radial-gradient(circle at 40% 38%, #ffffff, var(--violet) 70%);
    box-shadow:0 0 10px rgba(191,90,242,.7);
    opacity:.85;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ================= card ================= */
  .card{
    width:340px;
    padding:26px 28px 24px;
    border-radius:20px;
    text-align:center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.05), transparent 60%),
      linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.018));
    border:1px solid var(--hairline);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.16),
      inset 0 -1px 0 rgba(255,255,255,.04),
      0 34px 90px rgba(0,0,0,.46);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    /* staggered entrance */
    opacity:0;
    transform:translate3d(0,16px,0);
    animation:rise .9s var(--ease-soft) .2s forwards;
  }

  /* mark */
  .mark{
    width:58px; height:58px;
    margin:0 auto 16px;
    border-radius:14px;
    display:grid; place-items:center;
    position:relative;
    background:
      linear-gradient(150deg, rgba(255,255,255,.22), rgba(255,255,255,.04) 46%, transparent),
      linear-gradient(135deg, var(--blue), var(--cyan) 52%, #1f6dff);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.5),
      inset 0 -8px 18px rgba(1,30,90,.5),
      0 12px 30px rgba(0,70,170,.42);
  }
  .mark svg{ width:30px; height:30px; display:block; }
  /* subtle staggered entrance for the mark glyph */
  .mark{
    opacity:0;
    transform:translate3d(0,8px,0) scale(.9);
    animation:rise .8s var(--ease-soft) .34s forwards;
  }

  .name{
    font-size:20px;
    font-weight:600;
    letter-spacing:-.015em;
    line-height:1.1;
  }
  .status{
    margin-top:10px;
    font-size:13px;
    font-weight:500;
    letter-spacing:.01em;
    color:var(--ink-72);
    display:inline-flex;
    align-items:center;
    gap:7px;
  }
  .status .dot{
    width:5px; height:5px; border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px rgba(100,210,255,.9);
  }
  .sub{
    margin-top:5px;
    font-size:12px;
    line-height:1.35;
    color:var(--ink-56);
    letter-spacing:.005em;
  }

  /* progress bar — the ONE allowed width-ish animation, via scaleX */
  .track{
    position:relative;
    height:4px;
    margin:20px auto 16px;
    width:100%;
    border-radius:99px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .fill{
    position:absolute; inset:0;
    transform-origin:left center;
    transform:scaleX(.18);
    border-radius:99px;
    background:linear-gradient(90deg, var(--blue), var(--cyan) 70%, #9be4ff);
    box-shadow:0 0 12px rgba(100,210,255,.5);
    will-change:transform;
    transition:transform 1.1s var(--ease-soft);
  }

  /* step chips */
  .chips{
    display:flex; gap:8px; justify-content:center;
  }
  .chip{
    font-size:11px;
    font-weight:550;
    letter-spacing:.02em;
    padding:5px 11px;
    border-radius:99px;
    color:var(--ink-40);
    background:rgba(255,255,255,.035);
    border:1px solid rgba(255,255,255,.07);
    display:inline-flex; align-items:center; gap:6px;
    transition:color .5s var(--ease-std), opacity .5s var(--ease-std);
    opacity:.7;
  }
  .chip .tick{
    width:5px; height:5px; border-radius:50%;
    background:rgba(246,247,251,.22);
    transition:transform .5s var(--ease-soft), opacity .5s var(--ease-std);
    transform:scale(.7);
  }
  .chip.done{
    color:var(--cyan);
    opacity:1;
    background:rgba(0,122,255,.12);
    border-color:rgba(100,210,255,.34);
  }
  .chip.done .tick{
    background:var(--cyan);
    box-shadow:0 0 8px rgba(100,210,255,.85);
    transform:scale(1);
  }

  /* shared entrance keyframe */
  @keyframes rise{
    to{ opacity:1; transform:translate3d(0,0,0) scale(1); }
  }

  .wrap{
    display:grid;
    place-items:center;
    transform:translateZ(0);
  }

  /* ---------- reduced motion: freeze decorative drift, keep a faint pulse ---------- */
  @media (prefers-reduced-motion: reduce){
    .ambient{ animation:none; transform:translate3d(0,0,0); }
    .orbit-1,.orbit-2,.orbit-3{ animation:none; }
    .core{ animation:core-pulse 3.4s var(--ease-std) infinite alternate; }
    @keyframes core-pulse{ from{opacity:.9;} to{opacity:1;} }
    .stage,.card,.mark{ animation-duration:.01ms; opacity:1; transform:none; }
    .fill{ transition:none; }
  }
</style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="wrap">
    <!-- ORBIT SYSTEM -->
    <div class="stage" aria-hidden="true">
      <div class="halo"></div>
      <div class="core"></div>
      <div class="orbit orbit-3"><span class="pt"></span></div>
      <div class="orbit orbit-1"><span class="pt"></span></div>
      <div class="orbit orbit-2"><span class="pt"></span></div>
    </div>

    <!-- CARD -->
    <section class="card" role="status" aria-live="polite" aria-label="Vintrace is opening">
      <div class="mark">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 6.5 L16 25 L25 6.5"
                stroke="#ffffff" stroke-width="3.1"
                stroke-linecap="round" stroke-linejoin="round"
                opacity="0.96"/>
        </svg>
      </div>

      <div class="name">Vintrace</div>
      <div class="status"><span class="dot"></span>Opening app</div>
      <p class="sub">Loading private on-device review data.</p>

      <div class="track"><div class="fill" id="fill"></div></div>

      <div class="chips">
        <span class="chip" id="chip-0"><span class="tick"></span>Shell</span>
        <span class="chip" id="chip-1"><span class="tick"></span>Engine</span>
        <span class="chip" id="chip-2"><span class="tick"></span>App folder</span>
      </div>
    </section>
  </div>

  <script>
    /* Tiny driver: fake progress 18% -> 94% + chip sequence.
       Only sets transform: scaleX() on the fill and toggles a class. */
    (function(){
      var fill  = document.getElementById('fill');
      var chips = [0,1,2].map(function(i){ return document.getElementById('chip-'+i); });
      var steps = [
        { p:0.34, chip:0, t:600  },
        { p:0.58, chip:1, t:1500 },
        { p:0.82, chip:2, t:2600 },
        { p:0.94, chip:-1, t:3600 }
      ];
      // settle from the initial .18 quickly so it feels alive on first paint
      requestAnimationFrame(function(){
        fill.style.transform = 'scaleX(0.22)';
      });
      steps.forEach(function(s){
        setTimeout(function(){
          fill.style.transform = 'scaleX(' + s.p + ')';
          if (s.chip >= 0 && chips[s.chip]) chips[s.chip].classList.add('done');
        }, s.t);
      });
    })();
  </script>
</body>
</html>
