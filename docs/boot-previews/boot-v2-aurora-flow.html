<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vintrace — Opening</title>
<style>
  :root {
    --text: #f4f8ff;
    --text-72: rgba(244, 248, 255, 0.74);
    --text-56: rgba(244, 248, 255, 0.56);
    --text-40: rgba(244, 248, 255, 0.42);
    --emerald: #36f0c0;
    --cyan: #57e6ff;
    --pink: #ff7ad9;
    --ease-soft: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-inout: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    /* Deep night-blue base — also the first frame the eye sees before WebGL paints */
    background: radial-gradient(130% 100% at 50% 8%, #0a1430 0%, #060c20 46%, #02040d 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  /* ---------- STAGE ---------- */
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    isolation: isolate;
  }

  /* ---------- LIVING BACKGROUND (WebGL canvas) ---------- */
  #gl {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -3;
    display: block;
  }

  /* ---------- CSS FALLBACK AURORA ----------
     Shown only if WebGL fails (body gets .no-webgl). Rich, animated, multi-hue —
     never a black screen. Three drifting/breathing color curtains over the base. */
  .fallback {
    position: fixed;
    inset: 0;
    z-index: -3;
    pointer-events: none;
    display: none;
    overflow: hidden;
    background: radial-gradient(130% 100% at 50% 8%, #0a1430 0%, #060c20 46%, #02040d 100%);
  }
  body.no-webgl .fallback { display: block; }
  body.no-webgl #gl { display: none; }

  .fallback::before,
  .fallback::after {
    content: "";
    position: absolute;
    left: -25%;
    right: -25%;
    top: -35%;
    height: 150%;
    filter: blur(60px);
    will-change: transform, opacity;
  }
  .fallback::before {
    background:
      radial-gradient(40% 60% at 30% 40%, rgba(54, 240, 192, 0.55) 0%, rgba(54, 240, 192, 0) 60%),
      radial-gradient(42% 64% at 64% 52%, rgba(87, 230, 255, 0.50) 0%, rgba(87, 230, 255, 0) 62%),
      radial-gradient(38% 58% at 50% 26%, rgba(124, 92, 255, 0.34) 0%, rgba(124, 92, 255, 0) 66%);
    transform: translate3d(-6%, 2%, 0) rotate(-6deg);
    animation: fbDriftA 19s var(--ease-inout) infinite alternate, fbBreathe 8s var(--ease-inout) infinite alternate;
  }
  .fallback::after {
    background:
      radial-gradient(36% 60% at 72% 36%, rgba(255, 122, 217, 0.34) 0%, rgba(255, 122, 217, 0) 62%),
      radial-gradient(40% 62% at 22% 64%, rgba(87, 230, 255, 0.40) 0%, rgba(87, 230, 255, 0) 64%),
      radial-gradient(34% 56% at 50% 80%, rgba(54, 240, 192, 0.30) 0%, rgba(54, 240, 192, 0) 66%);
    transform: translate3d(6%, -2%, 0) rotate(5deg);
    animation: fbDriftB 23s var(--ease-inout) infinite alternate, fbBreathe 11s var(--ease-inout) 1s infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes fbDriftA {
    0%   { transform: translate3d(-8%, 3%, 0) rotate(-7deg) scale(1.02); }
    100% { transform: translate3d(8%, -3%, 0) rotate(4deg) scale(1.12); }
  }
  @keyframes fbDriftB {
    0%   { transform: translate3d(7%, -3%, 0) rotate(6deg) scale(1.08); }
    100% { transform: translate3d(-7%, 4%, 0) rotate(-4deg) scale(1.0); }
  }
  @keyframes fbBreathe {
    0%   { opacity: 0.5; }
    100% { opacity: 0.92; }
  }

  /* Vignette + a touch of grain-free darkening so foreground text stays crisp
     over the vivid color. Static, GPU-cheap, sits above bg but below card. */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background:
      radial-gradient(120% 86% at 50% 40%, transparent 30%, rgba(2, 4, 13, 0.42) 78%, rgba(2, 4, 13, 0.72) 100%);
  }

  /* ---------- FROSTED CARD ---------- */
  .card {
    position: relative;
    width: 384px;
    max-width: calc(100vw - 48px);
    padding: 38px 38px 32px;
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.085) 0%, rgba(255, 255, 255, 0.028) 100%);
    border: 1px solid rgba(255, 255, 255, 0.11);
    -webkit-backdrop-filter: blur(30px) saturate(150%);
    backdrop-filter: blur(30px) saturate(150%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.12) inset,
      0 0 0 1px rgba(0, 0, 0, 0.18),
      0 34px 90px -22px rgba(0, 0, 0, 0.66),
      0 10px 30px -14px rgba(0, 0, 0, 0.52);
    text-align: center;
    /* entrance */
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 16px, 0) scale(0.984);
    animation: cardIn 1.05s var(--ease-soft) 0.06s forwards;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
  }

  /* hairline inner top highlight (the "lit glass edge") */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0) 34%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* ---------- MARK ---------- */
  .mark {
    position: relative;
    width: 58px;
    height: 58px;
    margin: 0 auto 20px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    /* emerald→cyan badge to echo the aurora, not the old blue */
    background: linear-gradient(155deg, #2ce6c4 0%, #19b9d6 50%, #1f8be0 100%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.5) inset,
      0 12px 28px -8px rgba(46, 220, 200, 0.5),
      0 2px 6px rgba(0, 0, 0, 0.42);
    /* entrance (separate node, staggered) */
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0) scale(0.9);
    animation: markIn 0.95s var(--ease-soft) 0.2s forwards;
  }

  @keyframes markIn {
    to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
  }

  /* slow conic sheen ring around the badge — rotates via transform only */
  .mark .sheen {
    position: absolute;
    inset: -1.5px;
    border-radius: 9.5px;
    padding: 1.5px;
    background: conic-gradient(
      from 0deg,
      rgba(255, 255, 255, 0) 0deg,
      rgba(255, 255, 255, 0) 196deg,
      rgba(87, 230, 255, 0.85) 300deg,
      rgba(255, 255, 255, 0.95) 338deg,
      rgba(54, 240, 192, 0.0) 360deg
    );
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    will-change: transform;
    transform: rotate(0deg);
    animation: sheenSpin 9s linear infinite;
  }

  @keyframes sheenSpin {
    to { transform: rotate(360deg); }
  }

  .mark svg { position: relative; display: block; }

  /* ---------- TEXT ---------- */
  .name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.32s forwards;
  }

  .status {
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--text-72);
    margin: 0 0 4px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.4s forwards;
  }

  .sub {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: var(--text-56);
    margin: 0 0 26px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.48s forwards;
  }

  @keyframes textIn {
    to { opacity: 1; transform: translate3d(0, 0, 0); }
  }

  /* ---------- PROGRESS BAR ---------- */
  /* Driven by scaleX (transform), never width. transform-origin left. */
  .progress {
    position: relative;
    height: 4px;
    width: 100%;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    opacity: 0;
    animation: textIn 0.8s var(--ease-soft) 0.56s forwards;
  }

  .progress .fill {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    border-radius: 999px;
    /* aurora-spectrum sweep */
    background: linear-gradient(90deg, #2ce6c4 0%, #57e6ff 52%, #b58bff 100%);
    box-shadow: 0 0 14px rgba(87, 230, 255, 0.5);
    will-change: transform;
    transform: scaleX(0.18);
    transition: transform 1.15s var(--ease-soft);
  }

  /* ---------- STEP CHIPS ---------- */
  .chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 22px;
    opacity: 0;
    animation: textIn 0.8s var(--ease-soft) 0.64s forwards;
  }

  .chip {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text-40);
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.028);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.6s var(--ease-inout), border-color 0.6s var(--ease-inout), background-color 0.6s var(--ease-inout);
  }

  .chip .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
    transition: opacity 0.6s var(--ease-inout), box-shadow 0.6s var(--ease-inout);
  }

  .chip.done {
    color: var(--emerald);
    border-color: rgba(54, 240, 192, 0.34);
    background: rgba(54, 240, 192, 0.1);
  }
  .chip.done .dot {
    opacity: 1;
    box-shadow: 0 0 8px rgba(54, 240, 192, 0.8);
  }

  /* ---------- REDUCED MOTION ---------- */
  @media (prefers-reduced-motion: reduce) {
    /* The JS pauses the rAF loop on ONE gorgeous static aurora frame.
       Foreground entrance + fallback drift are also stilled here. */
    .fallback::before,
    .fallback::after { animation: none; opacity: 0.78; }
    .mark .sheen { animation: none; opacity: 0.5; }
    .card, .mark, .name, .status, .sub, .progress, .chips {
      animation-duration: 0.001s;
      animation-delay: 0s;
      opacity: 1;
      transform: none;
    }
    .progress .fill { transition: none; }
  }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="gl" aria-hidden="true"></canvas>
    <div class="fallback" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="card" role="status" aria-live="polite" aria-label="Opening Vintrace">
      <div class="mark" aria-hidden="true">
        <span class="sheen"></span>
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6 L15 23 L25 6" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1 class="name">Vintrace</h1>
      <p class="status">Opening app</p>
      <p class="sub">Loading private on-device review data.</p>

      <div class="progress" aria-hidden="true">
        <div class="fill" id="fill"></div>
      </div>

      <div class="chips" aria-hidden="true">
        <span class="chip" id="chip-0"><span class="dot"></span>Shell</span>
        <span class="chip" id="chip-1"><span class="dot"></span>Engine</span>
        <span class="chip" id="chip-2"><span class="dot"></span>App folder</span>
      </div>
    </main>
  </div>

  <!-- ============================================================
       AURORA FLOW — WebGL1 / GLSL ES 1.00 flowing-aurora shader.
       Full-screen triangle, single uTime uniform, rAF-driven.
       Layered fbm + domain warp = vertical color curtains that
       advect (flow noise) and breathe in intensity. Emerald/cyan/
       teal core with violet + hot-pink fringes over deep night-blue,
       plus faint twinkling stars and a soft additive bloom.
       ============================================================ -->
  <script>
  (function () {
    "use strict";

    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ---------- Foreground driver: progress 18% -> 94% + chip stagger ---------- */
    (function foreground() {
      var fill = document.getElementById('fill');
      var chips = [
        document.getElementById('chip-0'),
        document.getElementById('chip-1'),
        document.getElementById('chip-2')
      ];
      function setProgress(pct) { fill.style.transform = 'scaleX(' + (pct / 100) + ')'; }
      setProgress(18);
      if (reduce) {
        setProgress(94);
        chips.forEach(function (c) { c.classList.add('done'); });
        return;
      }
      var steps = [
        { at: 720,  pct: 47, chip: 0 },
        { at: 1760, pct: 73, chip: 1 },
        { at: 2980, pct: 94, chip: 2 }
      ];
      steps.forEach(function (s) {
        setTimeout(function () {
          setProgress(s.pct);
          if (chips[s.chip]) chips[s.chip].classList.add('done');
        }, s.at);
      });
    })();

    /* ---------- WebGL aurora ---------- */
    var canvas = document.getElementById('gl');
    var gl = null;
    try {
      var opts = { alpha: false, antialias: false, depth: false, stencil: false, premultipliedAlpha: false, preserveDrawingBuffer: false, powerPreference: 'low-power' };
      gl = canvas.getContext('webgl', opts) || canvas.getContext('experimental-webgl', opts);
    } catch (e) { gl = null; }

    if (!gl) {
      // Graceful fallback: rich animated CSS gradient aurora (.fallback shows via this class).
      document.body.classList.add('no-webgl');
      return;
    }

    var VERT = [
      'attribute vec2 aPos;',
      'void main(){ gl_Position = vec4(aPos, 0.0, 1.0); }'
    ].join('\n');

    /* Fragment shader. Cost kept reasonable: fbm = 5 octaves, one domain-warp
       pass, a handful of curtain samples. Holds 60fps at DPR<=2. */
    var FRAG = [
      'precision highp float;',
      'uniform vec2  uRes;',
      'uniform float uTime;',
      '',
      '// hash / value noise',
      'float hash(vec2 p){',
      '  p = fract(p * vec2(123.34, 456.21));',
      '  p += dot(p, p + 45.32);',
      '  return fract(p.x * p.y);',
      '}',
      'float vnoise(vec2 p){',
      '  vec2 i = floor(p);',
      '  vec2 f = fract(p);',
      '  vec2 u = f * f * (3.0 - 2.0 * f);',
      '  float a = hash(i + vec2(0.0,0.0));',
      '  float b = hash(i + vec2(1.0,0.0));',
      '  float c = hash(i + vec2(0.0,1.0));',
      '  float d = hash(i + vec2(1.0,1.0));',
      '  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);',
      '}',
      'float fbm(vec2 p){',
      '  float v = 0.0;',
      '  float a = 0.5;',
      '  mat2 m = mat2(1.6, 1.2, -1.2, 1.6);',
      '  for(int i = 0; i < 5; i++){',
      '    v += a * vnoise(p);',
      '    p = m * p;',
      '    a *= 0.5;',
      '  }',
      '  return v;',
      '}',
      '',
      '// curated aurora palette (deep night-blue base -> emerald/cyan/teal -> violet/pink fringe)',
      'vec3 auroraRamp(float t){',
      '  t = clamp(t, 0.0, 1.0);',
      '  vec3 base   = vec3(0.012, 0.035, 0.090);  // night blue',
      '  vec3 teal   = vec3(0.020, 0.420, 0.470);  // deep teal',
      '  vec3 emer   = vec3(0.110, 0.880, 0.620);  // emerald',
      '  vec3 cyan   = vec3(0.340, 0.900, 1.000);  // bright cyan',
      '  vec3 violet = vec3(0.560, 0.420, 1.000);  // violet fringe',
      '  vec3 pink   = vec3(1.000, 0.470, 0.820);  // hot pink fringe',
      '  vec3 c = mix(base, teal, smoothstep(0.0, 0.30, t));',
      '  c = mix(c, emer,   smoothstep(0.22, 0.55, t));',
      '  c = mix(c, cyan,   smoothstep(0.50, 0.74, t));',
      '  c = mix(c, violet, smoothstep(0.74, 0.90, t));',
      '  c = mix(c, pink,   smoothstep(0.90, 1.00, t));',
      '  return c;',
      '}',
      '',
      'void main(){',
      '  vec2 frag = gl_FragCoord.xy;',
      '  vec2 uv = frag / uRes;',
      '  // aspect-correct space centered horizontally',
      '  vec2 p = (frag - 0.5 * uRes) / uRes.y;',
      '  float t = uTime;',
      '',
      '  // ---- domain warp: makes the curtains ripple & advect organically ----',
      '  vec2 q = vec2(',
      '    fbm(p * 1.6 + vec2(0.0, t * 0.06)),',
      '    fbm(p * 1.6 + vec2(5.2, -t * 0.05) + 3.1)',
      '  );',
      '  vec2 warp = p + 0.55 * (q - 0.5);',
      '',
      '  // ---- vertical curtains: bands in X that drift sideways + flow upward ----',
      '  float flow = t * 0.10;',
      '  float curtains = 0.0;',
      '  // three advecting curtain layers at different scales/speeds for depth',
      '  curtains += 0.60 * fbm(vec2(warp.x * 2.4 + flow,        warp.y * 1.1 - t * 0.14));',
      '  curtains += 0.30 * fbm(vec2(warp.x * 4.7 - flow * 1.7,  warp.y * 1.6 - t * 0.20) + 11.0);',
      '  curtains += 0.16 * fbm(vec2(warp.x * 8.5 + flow * 2.3,  warp.y * 2.3 - t * 0.27) + 23.0);',
      '',
      '  // vertical falloff — aurora is strongest in the upper-mid sky, fades low',
      '  float skyY = uv.y;',
      '  float height = smoothstep(-0.10, 0.95, skyY);',
      '  float topFade = 1.0 - smoothstep(0.78, 1.08, skyY);',
      '  float band = curtains * (0.55 + 0.65 * height) * topFade;',
      '',
      '  // breathing: slow global intensity pulse + a faster shimmer',
      '  float breathe = 0.80 + 0.20 * sin(t * 0.45);',
      '  float shimmer = 0.92 + 0.08 * sin(warp.x * 6.0 + t * 1.6);',
      '  band *= breathe * shimmer;',
      '',
      '  // map band -> color along the curated ramp',
      '  float intensity = smoothstep(0.18, 1.05, band);',
      '  vec3 col = auroraRamp(intensity);',
      '',
      '  // glow core: brighten where curtains are densest (additive feel)',
      '  float core = smoothstep(0.55, 1.0, band);',
      '  col += core * core * vec3(0.16, 0.42, 0.40);',
      '',
      '  // violet/pink fringe rides the leading edge of each curtain',
      '  float edge = smoothstep(0.34, 0.5, band) * (1.0 - smoothstep(0.5, 0.72, band));',
      '  col += edge * vec3(0.30, 0.10, 0.34);',
      '',
      '  // deep base wash so lower screen is luminous night-blue, never pure black',
      '  vec3 baseWash = mix(vec3(0.010, 0.022, 0.060), vec3(0.020, 0.060, 0.120), uv.y);',
      '  col = baseWash + col;',
      '',
      '  // ---- stars / sparkle points (faint, twinkling) ----',
      '  vec2 sg = frag / 2.4;',
      '  float star = hash(floor(sg));',
      '  float starMask = step(0.9965, star);',
      '  float tw = 0.5 + 0.5 * sin(t * 3.0 + star * 90.0);',
      '  // stars dim where the aurora is bright (occlusion), brighter up high',
      '  float starVis = (0.35 + 0.65 * smoothstep(0.2, 0.9, uv.y)) * (1.0 - 0.7 * intensity);',
      '  col += starMask * tw * starVis * vec3(0.7, 0.82, 1.0) * 0.9;',
      '',
      '  // soft bloom toward upper center, gentle vignette toward edges',
      '  float bloom = smoothstep(0.9, 0.0, length((uv - vec2(0.5, 0.62)) * vec2(1.2, 1.0)));',
      '  col += bloom * intensity * vec3(0.05, 0.12, 0.13);',
      '  float vig = smoothstep(1.25, 0.35, length(uv - 0.5));',
      '  col *= 0.62 + 0.38 * vig;',
      '',
      '  // filmic-ish tone + subtle dithering to kill banding on smooth gradients',
      '  col = col / (col + vec3(0.55));',
      '  col = pow(col, vec3(0.86));',
      '  float dither = (hash(frag + fract(t)) - 0.5) / 255.0;',
      '  col += dither;',
      '',
      '  gl_FragColor = vec4(col, 1.0);',
      '}'
    ].join('\n');

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, VERT);
    var fs = compile(gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) { document.body.classList.add('no-webgl'); return; }

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.bindAttribLocation(prog, 0, 'aPos');
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { document.body.classList.add('no-webgl'); return; }
    gl.useProgram(prog);

    // Full-screen triangle (covers clip space, cheaper than a quad)
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, 'uRes');
    var uTime = gl.getUniformLocation(prog, 'uTime');

    var dpr = 1;
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      var w = Math.max(1, Math.round(canvas.clientWidth * dpr));
      var h = Math.max(1, Math.round(canvas.clientHeight * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', resize);

    var raf = 0;
    var start = (typeof performance !== 'undefined' ? performance.now() : Date.now());
    var running = false;

    function frame(now) {
      var t = (now - start) / 1000;
      gl.uniform1f(uTime, t);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      raf = requestAnimationFrame(frame);
    }

    function renderOnce(t) {
      gl.uniform1f(uTime, t);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }

    function play() {
      if (running) return;
      running = true;
      start = (typeof performance !== 'undefined' ? performance.now() : Date.now()) - frozenT * 1000;
      raf = requestAnimationFrame(frame);
    }
    function pause() {
      running = false;
      if (raf) { cancelAnimationFrame(raf); raf = 0; }
    }

    // prefers-reduced-motion: render ONE gorgeous static frame, then stop. No loop.
    var frozenT = 0;
    if (reduce) {
      frozenT = 6.5; // a hand-picked moment with a nice curtain spread
      renderOnce(frozenT);
      // No rAF loop is ever started.
    } else {
      play();
    }

    /* ---------- Lifecycle: pause when hidden, clean up on pagehide ---------- */
    document.addEventListener('visibilitychange', function () {
      if (reduce) return;
      if (document.hidden) {
        frozenT = ((typeof performance !== 'undefined' ? performance.now() : Date.now()) - start) / 1000;
        pause();
      } else {
        play();
      }
    });

    function destroy() {
      pause();
      window.removeEventListener('resize', resize);
      try {
        var ext = gl.getExtension('WEBGL_lose_context');
        if (ext) ext.loseContext();
      } catch (e) {}
    }
    window.addEventListener('pagehide', destroy);
    // belt-and-suspenders for environments that fire unload but not pagehide
    window.addEventListener('beforeunload', destroy);
  })();
  </script>
</body>
