<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vintrace — Opening (Nebula Particles)</title>
<style>
  /* ============================================================
     "Nebula Particles" — a living colour hero, hand-tuned.

     A Canvas2D curl-noise particle field: ~1100 small glowing
     particles streaming along a continuous, divergence-free
     curl-noise vector field, additively blended ('lighter') into
     luminous streaks of cyan, magenta, violet and gold over a deep
     space-navy. Three parallax depth layers (near/mid/far) differ in
     size, speed and brightness for real dimensionality. A soft
     central glow anchors the eye and lets the frosted card breathe.

     The motion is GORGEOUS-not-soup by construction: a single curated
     palette sampled along the field (no random RGB), velocity-coherent
     flow (particles never strobe — they advect), and gentle hue drift
     in time so the colour *evolves* rather than flickers.

     Foreground motion (card / mark / ring / dot / chips) is strictly
     transform + opacity, so it composites independently of the canvas.
     ============================================================ */
  :root {
    --text: #f6f7fb;
    --text-72: rgba(246, 247, 251, 0.72);
    --text-56: rgba(246, 247, 251, 0.56);
    --text-40: rgba(246, 247, 251, 0.40);
    --accent: #007aff;
    --cyan: #64d2ff;
    --violet: #bf5af2;
    --ease-soft: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-inout: cubic-bezier(0.4, 0, 0.2, 1);
    --boot-fill: 0.18;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    /* Deep space-navy base. The canvas paints over this; the gradient also
       serves as the CSS fallback floor if WebGL/Canvas ever can't run. */
    background:
      radial-gradient(125% 95% at 50% 30%, #131a36 0%, #0a0f24 42%, #05060f 78%, #030309 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    isolation: isolate;
  }

  /* ---------- LIVING CANVAS (the nebula) ---------- */
  #nebula {
    position: fixed;
    inset: 0;
    z-index: -3;
    display: block;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ---------- RICH CSS FALLBACK (only shown if canvas can't run) ----------
     A multi-hue drifting mesh so a failure is still colourful + alive,
     never a black screen. Hidden by default; revealed by adding
     .use-fallback to <html>. Pure transform/opacity + background-position
     drift (cheap, GPU-friendly enough for a fallback path). */
  .fallback {
    position: fixed;
    inset: 0;
    z-index: -3;
    display: none;
    pointer-events: none;
    background:
      radial-gradient(42% 50% at 22% 30%, rgba(100, 210, 255, 0.55) 0%, rgba(100, 210, 255, 0) 60%),
      radial-gradient(46% 52% at 80% 26%, rgba(191, 90, 242, 0.50) 0%, rgba(191, 90, 242, 0) 62%),
      radial-gradient(50% 55% at 68% 78%, rgba(255, 92, 168, 0.42) 0%, rgba(255, 92, 168, 0) 64%),
      radial-gradient(46% 50% at 26% 80%, rgba(255, 196, 92, 0.34) 0%, rgba(255, 196, 92, 0) 62%),
      radial-gradient(120% 100% at 50% 40%, #131a36 0%, #0a0f24 50%, #04050d 100%);
    background-size: 200% 200%, 220% 220%, 200% 200%, 220% 220%, 100% 100%;
    background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, center;
    filter: saturate(122%);
    animation: fallbackDrift 26s var(--ease-inout) infinite alternate;
  }
  .use-fallback .fallback { display: block; }
  @keyframes fallbackDrift {
    0%   { background-position:   0%   0%, 100%   0%, 100% 100%,   0% 100%, center; }
    100% { background-position: 100% 100%,   0% 100%,   0%   0%, 100%   0%, center; }
  }

  /* central soft glow + vignette, painted in CSS over the canvas so the
     card always has a calm, readable pocket regardless of particle flux */
  .glow {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background:
      radial-gradient(38% 34% at 50% 47%, rgba(120, 180, 255, 0.16) 0%, rgba(120, 180, 255, 0) 70%),
      radial-gradient(120% 95% at 50% 44%, transparent 30%, rgba(3, 4, 10, 0.42) 72%, rgba(2, 3, 8, 0.72) 100%);
  }

  /* whisper-faint forensic grid (identity carryover) — static, masked tight */
  .grid {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(246, 247, 251, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(246, 247, 251, 0.03) 1px, transparent 1px);
    background-size: 46px 46px;
    background-position: center;
    -webkit-mask-image: radial-gradient(circle at 50% 47%, #000 0%, #000 20%, transparent 56%);
            mask-image: radial-gradient(circle at 50% 47%, #000 0%, #000 20%, transparent 56%);
  }

  /* ---------- FROSTED CARD ---------- */
  .card {
    position: relative;
    z-index: 1;
    width: 384px;
    max-width: calc(100vw - 48px);
    padding: 40px 38px 34px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.075) 0%, rgba(255, 255, 255, 0.025) 100%);
    border: 1px solid rgba(255, 255, 255, 0.11);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    backdrop-filter: blur(20px) saturate(140%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.12) inset,
      0 0 0 1px rgba(0, 0, 0, 0.22),
      0 34px 90px -22px rgba(0, 0, 0, 0.7),
      0 8px 24px -12px rgba(0, 0, 0, 0.55);
    text-align: center;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 14px, 0) scale(0.985);
    animation: cardIn 1s var(--ease-soft) 0.05s forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }

  /* hairline inner top highlight (masked rim) */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 22px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0) 34%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* ---------- MARK + INSTRUMENT RING ---------- */
  .mark {
    position: relative;
    width: 58px;
    height: 58px;
    margin: 4px auto 26px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    background: linear-gradient(160deg, #0a84ff 0%, #007aff 48%, #0064d6 100%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.45) inset,
      0 -1px 1px rgba(0, 30, 80, 0.5) inset,
      0 10px 26px -8px rgba(0, 122, 255, 0.6),
      0 2px 6px rgba(0, 0, 0, 0.4);
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0) scale(0.9);
    animation:
      markIn 0.9s var(--ease-soft) 0.18s forwards,
      markBreathe 4.6s var(--ease-inout) 1.3s infinite;
  }
  @keyframes markIn  { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }
  @keyframes markBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.028); } }

  /* top specular highlight on the badge (jewel-like, static) */
  .mark::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: radial-gradient(120% 80% at 50% 0%, rgba(255, 255, 255, 0.30), transparent 60%);
    pointer-events: none;
  }

  /* faint static dial track — the instrument base */
  .ring-base {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(246, 247, 251, 0.07);
    box-shadow: inset 0 0 0 1px rgba(0, 122, 255, 0.05);
    pointer-events: none;
  }

  /* outer thin conic ring — rotates slowly (transform only) */
  .ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
    background: conic-gradient(
      from 0deg,
      rgba(100, 210, 255, 0) 0deg,
      rgba(100, 210, 255, 0) 42deg,
      rgba(0, 122, 255, 0.85) 130deg,
      rgba(100, 210, 255, 1) 205deg,
      rgba(191, 90, 242, 0.45) 255deg,
      rgba(100, 210, 255, 0) 360deg
    );
    animation: ringSpin 14s linear infinite;
  }
  @keyframes ringSpin { to { transform: rotate(360deg); } }

  /* single faint scanner sweep — orbits the badge slowly */
  .sweep {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform;
    animation: sweepSpin 7s linear infinite;
  }
  .sweep::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50%;
    height: 1px;
    transform-origin: left center;
    background: linear-gradient(90deg, rgba(100, 210, 255, 0.5) 0%, rgba(100, 210, 255, 0) 86%);
  }
  @keyframes sweepSpin { to { transform: rotate(360deg); } }

  .mark svg { position: relative; z-index: 1; display: block; }

  /* ---------- TEXT ---------- */
  .name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.30s forwards;
  }
  .status {
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--text-72);
    margin: 0 0 5px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.38s forwards;
  }
  /* live cyan status dot — pulses (transform + opacity) as the "is-alive" signal */
  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px rgba(100, 210, 255, 0.85);
    will-change: transform, opacity;
    animation: dotPulse 1.9s var(--ease-inout) infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.45; transform: scale(0.82); }
    50%      { opacity: 1;    transform: scale(1); }
  }
  .sub {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: var(--text-56);
    margin: 0 0 26px;
    min-height: 15px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.8s var(--ease-soft) 0.46s forwards;
  }
  @keyframes textIn { to { opacity: 1; transform: translate3d(0, 0, 0); } }

  /* ---------- PROGRESS (scaleX via transform, the one allowed exception) ---------- */
  .progress {
    position: relative;
    height: 4px;
    width: 100%;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.09);
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    opacity: 0;
    animation: textIn 0.8s var(--ease-soft) 0.54s forwards;
  }
  .progress .fill {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    border-radius: 999px;
    background: linear-gradient(90deg, #007aff 0%, #64d2ff 55%, #bf5af2 100%);
    box-shadow: 0 0 12px rgba(100, 210, 255, 0.5);
    will-change: transform;
    transform: scaleX(var(--boot-fill, 0.18));
    transition: transform 1.1s var(--ease-soft);
  }

  /* ---------- STEP CHIPS ---------- */
  .chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 22px;
    opacity: 0;
    animation: textIn 0.8s var(--ease-soft) 0.62s forwards;
  }
  .chip {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text-40);
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.07);
    background: rgba(255, 255, 255, 0.025);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.5s var(--ease-inout), border-color 0.5s var(--ease-inout), background-color 0.5s var(--ease-inout);
  }
  .chip .tick {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.45;
    transform: scale(0.7);
    transition: opacity 0.5s var(--ease-inout), transform 0.5s var(--ease-soft);
  }
  .chip.done {
    color: var(--cyan);
    border-color: rgba(100, 210, 255, 0.30);
    background: rgba(0, 122, 255, 0.12);
  }
  .chip.done .tick { opacity: 1; transform: scale(1); }

  /* ---------- ERROR STATE ---------- */
  .boot-failed .ring,
  .boot-failed .sweep { display: none; }
  .boot-failed .status .dot {
    background: #ff6b62;
    box-shadow: 0 0 8px rgba(255, 107, 98, 0.7);
    animation: none;
    opacity: 1;
  }
  .boot-failed .progress .fill { background: linear-gradient(90deg, #ff453a, #ff9f0a); }

  /* ---------- REDUCED MOTION ----------
     The JS loop freezes itself (renders ONE gorgeous static frame then stops
     rAF). Here we also calm the foreground to a single static, colourful frame. */
  @media (prefers-reduced-motion: reduce) {
    .fallback { animation: none; background-position: 30% 35%, 80% 20%, 70% 80%, 20% 75%, center; }
    .ring, .sweep { animation: none; }
    .mark { animation: none; }
    .status .dot { animation: none; opacity: 1; transform: none; }
    .card, .mark, .name, .status, .sub, .progress, .chips {
      opacity: 1;
      transform: none;
      animation: none;
    }
  }
</style>
</head>
<body>
  <div class="stage boot">
    <!-- decorative living background -->
    <canvas id="nebula" aria-hidden="true"></canvas>
    <div class="fallback" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>

    <main class="card" role="status" aria-live="polite" aria-label="Opening Vintrace">
      <div class="mark" aria-hidden="true">
        <span class="ring-base"></span>
        <span class="ring"></span>
        <span class="sweep"></span>
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6 L15 23 L25 6" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1 class="name">Vintrace</h1>
      <p class="status"><span class="dot"></span><span id="status-text">Opening app</span></p>
      <p class="sub">Loading private on-device review data.</p>

      <div class="progress" aria-hidden="true">
        <div class="fill" id="fill"></div>
      </div>

      <div class="chips" aria-hidden="true">
        <span class="chip done" id="chip-0"><span class="tick"></span>Shell</span>
        <span class="chip" id="chip-1"><span class="tick"></span>Engine</span>
        <span class="chip" id="chip-2"><span class="tick"></span>App folder</span>
      </div>
    </main>
  </div>

  <script>
  /* ================================================================
     NEBULA PARTICLES — Canvas2D curl-noise flow field.
     No libraries, no network. One rAF loop, capped particle count,
     additive 'lighter' compositing, DPR capped at 2.
     ================================================================ */
  (function () {
    "use strict";

    var html   = document.documentElement;
    var canvas = document.getElementById('nebula');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ---- Acquire a 2D context; if it fails, show the rich CSS fallback. ---- */
    var ctx = null;
    try { ctx = canvas.getContext('2d', { alpha: true, desynchronized: true }); }
    catch (e) { ctx = null; }
    if (!ctx) {
      html.classList.add('use-fallback');
      return; // CSS mesh-gradient takes over; never a black screen.
    }

    /* ---------------- value-noise field (deterministic, smooth) ----------------
       A tiny gradient/value noise we domain-warp to get a curl-like, organic
       flow. Cheap to evaluate (a few lookups + smoothstep), so thousands of
       particle samples per frame stay well inside frame budget. */
    var P = new Uint8Array(512);
    (function seedPerm() {
      var perm = new Uint8Array(256);
      for (var i = 0; i < 256; i++) perm[i] = i;
      // deterministic shuffle (fixed seed) so every launch looks the same/intentional
      var s = 1337;
      function rnd() { s = (s * 1664525 + 1013904223) & 0x7fffffff; return s / 0x7fffffff; }
      for (var j = 255; j > 0; j--) {
        var k = (rnd() * (j + 1)) | 0;
        var t = perm[j]; perm[j] = perm[k]; perm[k] = t;
      }
      for (var m = 0; m < 512; m++) P[m] = perm[m & 255];
    })();

    function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function grad(h, x, y) {
      // 8 directions — enough for smooth flow, very cheap
      switch (h & 7) {
        case 0: return  x + y;
        case 1: return  x - y;
        case 2: return -x + y;
        case 3: return -x - y;
        case 4: return  x;
        case 5: return -x;
        case 6: return  y;
        default: return -y;
      }
    }
    function noise2(x, y) {
      var X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      var xf = x - Math.floor(x), yf = y - Math.floor(y);
      var u = fade(xf), v = fade(yf);
      var aa = P[P[X] + Y], ab = P[P[X] + Y + 1];
      var ba = P[P[X + 1] + Y], bb = P[P[X + 1] + Y + 1];
      var x1 = lerp(grad(aa, xf, yf),     grad(ba, xf - 1, yf),     u);
      var x2 = lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u);
      return lerp(x1, x2, v); // ~[-1,1]
    }

    /* Curl of a scalar noise potential => a divergence-free (incompressible)
       vector field. That is the secret to "flow that never piles up or
       strobes" — particles advect along smooth, swirling streamlines. */
    var EPS = 0.0009;
    function curl(x, y, t) {
      // animate the potential slowly in time so the whole field evolves
      var n1 = noise2(x, y + t);
      var n2 = noise2(x, y - EPS + t);
      var n3 = noise2(x + EPS, y + t);
      var n4 = noise2(x - EPS, y + t);
      var dndy = (n1 - n2) / EPS;
      var dndx = (n3 - n4) / EPS;
      // curl in 2D: (d/dy, -d/dx)
      return { x: dndy, y: -dndx };
    }

    /* ---------------- curated palette ----------------
       Cyan -> azure -> violet -> magenta -> warm gold. We sample a hue from
       this ramp using a slowly-drifting field value, so colour is COHERENT
       across neighbouring particles (streaks share a hue) and EVOLVES in
       time — the antidote to rainbow-blob soup. Stored as additive RGB. */
    var STOPS = [
      [ 90, 210, 255],  // cyan
      [ 60, 140, 255],  // azure
      [140,  90, 245],  // violet
      [232,  92, 210],  // magenta
      [255, 150, 120],  // coral
      [255, 205, 110]   // gold
    ];
    function paletteRGB(t, out) {
      // t in [0,1) -> smooth ramp across STOPS (wrapping)
      var n = STOPS.length;
      var f = (t - Math.floor(t)) * n;
      var i = Math.floor(f);
      var frac = f - i;
      var a = STOPS[i % n], b = STOPS[(i + 1) % n];
      out[0] = a[0] + (b[0] - a[0]) * frac;
      out[1] = a[1] + (b[1] - a[1]) * frac;
      out[2] = a[2] + (b[2] - a[2]) * frac;
    }

    /* ---------------- sizing / DPR ---------------- */
    var DPR = 1, W = 0, H = 0, cx = 0, cy = 0;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2); // cap backing store at 2x
      W = Math.max(1, window.innerWidth);
      H = Math.max(1, window.innerHeight);
      canvas.width  = Math.round(W * DPR);
      canvas.height = Math.round(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0); // draw in CSS pixels
      cx = W * 0.5; cy = H * 0.47;
    }
    resize();

    /* ---------------- particles ----------------
       Count scales with viewport but is firmly capped for a locked 60fps.
       Three parallax layers (far/mid/near): far = tiny, slow, dim; near =
       larger, faster, brighter — yielding depth without any z math. */
    var AREA = (W * H);
    var COUNT = Math.max(420, Math.min(1100, Math.round(AREA / 1750)));

    // field scale: how "zoomed" the noise is (smaller => broader swirls)
    var FIELD = 0.0017;
    // how far the colour-hue noise is scaled (broad hue regions)
    var HUE_FIELD = 0.0011;

    var px = new Float32Array(COUNT);
    var py = new Float32Array(COUNT);
    var pl = new Uint8Array(COUNT);   // layer 0=far 1=mid 2=near
    var pa = new Float32Array(COUNT); // per-particle age (for respawn fade)
    var plife = new Float32Array(COUNT);

    var LAYER = [
      { speed: 26,  size: 0.62, bright: 0.40, life: [5.5, 9.5] }, // far
      { speed: 42,  size: 0.95, bright: 0.70, life: [4.5, 8.0] }, // mid
      { speed: 64,  size: 1.45, bright: 1.00, life: [3.5, 6.5] }  // near
    ];

    function rand(a, b) { return a + Math.random() * (b - a); }

    function spawn(i, fresh) {
      // weighted toward mid/near for a lively foreground, but plenty of far dust
      var r = Math.random();
      var layer = r < 0.42 ? 0 : (r < 0.78 ? 1 : 2);
      pl[i] = layer;
      // bias spawn around the centre glow so streaks emanate outward, with a
      // healthy scatter so edges stay populated
      if (Math.random() < 0.55) {
        var ang = Math.random() * Math.PI * 2;
        var rad = Math.pow(Math.random(), 0.5) * Math.min(W, H) * 0.42;
        px[i] = cx + Math.cos(ang) * rad;
        py[i] = cy + Math.sin(ang) * rad;
      } else {
        px[i] = Math.random() * W;
        py[i] = Math.random() * H;
      }
      var lf = LAYER[layer].life;
      plife[i] = rand(lf[0], lf[1]);
      pa[i] = fresh ? Math.random() * plife[i] : 0; // stagger initial ages
    }

    for (var i = 0; i < COUNT; i++) spawn(i, true);

    /* ---------------- render loop ---------------- */
    var rafId = 0;
    var running = false;
    var lastT = 0;
    var tField = 0;        // evolves the potential
    var hueShift = 0;      // slow global hue drift
    var tmp = [0, 0, 0];

    function step(nowMs) {
      rafId = requestAnimationFrame(step);
      var now = nowMs * 0.001;
      var dt = lastT ? Math.min(0.05, now - lastT) : 0.016; // clamp big gaps
      lastT = now;

      tField  += dt * 0.06;   // field evolution speed (gentle)
      hueShift += dt * 0.018;  // global colour drift (very gentle)

      // Trail/fade: instead of clearing, lay a low-alpha dark veil so streaks
      // persist briefly => luminous motion-trails. This veil also keeps the
      // base navy and prevents additive blow-out.
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(5, 7, 16, 0.20)';
      ctx.fillRect(0, 0, W, H);

      // Particles draw additively for glow.
      ctx.globalCompositeOperation = 'lighter';

      for (var j = 0; j < COUNT; j++) {
        var L = LAYER[pl[j]];

        // advect along curl field
        var v = curl(px[j] * FIELD, py[j] * FIELD, tField);
        var vx = v.x, vy = v.y;
        // normalise-ish so speed is governed by layer, not noise magnitude
        var m = Math.sqrt(vx * vx + vy * vy) || 1;
        vx = vx / m; vy = vy / m;

        // subtle outward bias so the nebula gently breathes from centre
        var dx = px[j] - cx, dy = py[j] - cy;
        var dd = Math.sqrt(dx * dx + dy * dy) || 1;
        vx += (dx / dd) * 0.14;
        vy += (dy / dd) * 0.14;

        var sp = L.speed * dt;
        px[j] += vx * sp;
        py[j] += vy * sp;

        // age + respawn
        pa[j] += dt;
        var t01 = pa[j] / plife[j];
        if (t01 >= 1 ||
            px[j] < -40 || px[j] > W + 40 ||
            py[j] < -40 || py[j] > H + 40) {
          spawn(j, false);
          continue;
        }

        // life fade: ease in then out (0 at birth/death, 1 mid-life)
        var fadeLife = Math.sin(t01 * Math.PI);

        // hue: sample broad colour regions from the field + global drift, so
        // neighbouring particles share hues (coherent streaks) yet it evolves
        var hueN = noise2(px[j] * HUE_FIELD + 11.3, py[j] * HUE_FIELD - 7.1) * 0.5 + 0.5;
        paletteRGB(hueN + hueShift, tmp);

        // brightness: layer * life-fade * mild radial falloff for centre lift
        var radial = 0.55 + 0.45 * Math.max(0, 1 - dd / (Math.min(W, H) * 0.6));
        var a = L.bright * fadeLife * radial * 0.55;
        if (a <= 0.003) continue;

        var size = L.size * (1 + radial * 0.6);

        // soft glow disc via radial gradient (small, cheap)
        var r = size * 3.2;
        var rr = Math.round(tmp[0]), gg = Math.round(tmp[1]), bb = Math.round(tmp[2]);
        var g = ctx.createRadialGradient(px[j], py[j], 0, px[j], py[j], r);
        g.addColorStop(0,   'rgba(' + rr + ',' + gg + ',' + bb + ',' + a.toFixed(3) + ')');
        g.addColorStop(0.4, 'rgba(' + rr + ',' + gg + ',' + bb + ',' + (a * 0.45).toFixed(3) + ')');
        g.addColorStop(1,   'rgba(' + rr + ',' + gg + ',' + bb + ',0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(px[j], py[j], r, 0, Math.PI * 2);
        ctx.fill();

        // bright core dot for sparkle
        ctx.fillStyle = 'rgba(255,255,255,' + (a * 0.5).toFixed(3) + ')';
        ctx.beginPath();
        ctx.arc(px[j], py[j], size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /* Render exactly ONE rich static frame (used for reduced-motion or when
       we want a frozen, gorgeous still). Advances the loop a handful of
       sub-steps so trails build up into actual streaks, then stops. */
    function renderStaticFrame() {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#05070f';
      ctx.fillRect(0, 0, W, H);
      // pre-roll several integration steps so streaks form (no animation shown)
      var pre = 90;
      for (var s = 0; s < pre; s++) {
        var fakeNow = (performance.now ? performance.now() : Date.now()) + s * 16.6;
        // manual mini-step without scheduling another rAF
        var now = fakeNow * 0.001;
        var dt = 0.016;
        tField += dt * 0.06; hueShift += dt * 0.018;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(5, 7, 16, 0.16)';
        ctx.fillRect(0, 0, W, H);
        ctx.globalCompositeOperation = 'lighter';
        for (var j = 0; j < COUNT; j++) {
          var L = LAYER[pl[j]];
          var v = curl(px[j] * FIELD, py[j] * FIELD, tField);
          var vx = v.x, vy = v.y;
          var m = Math.sqrt(vx * vx + vy * vy) || 1; vx /= m; vy /= m;
          var dx = px[j] - cx, dy = py[j] - cy; var dd = Math.sqrt(dx*dx+dy*dy)||1;
          vx += (dx/dd)*0.14; vy += (dy/dd)*0.14;
          var sp = L.speed * dt; px[j] += vx*sp; py[j] += vy*sp;
          pa[j] += dt; var t01 = pa[j]/plife[j];
          if (t01>=1 || px[j]<-40||px[j]>W+40||py[j]<-40||py[j]>H+40){ spawn(j,false); continue; }
          var fadeLife = Math.sin(t01*Math.PI);
          var hueN = noise2(px[j]*HUE_FIELD+11.3, py[j]*HUE_FIELD-7.1)*0.5+0.5;
          paletteRGB(hueN + hueShift, tmp);
          var radial = 0.55 + 0.45*Math.max(0,1-dd/(Math.min(W,H)*0.6));
          var a = L.bright*fadeLife*radial*0.55; if (a<=0.003) continue;
          var size = L.size*(1+radial*0.6); var r = size*3.2;
          var rr=Math.round(tmp[0]),gg=Math.round(tmp[1]),bb2=Math.round(tmp[2]);
          var g=ctx.createRadialGradient(px[j],py[j],0,px[j],py[j],r);
          g.addColorStop(0,'rgba('+rr+','+gg+','+bb2+','+a.toFixed(3)+')');
          g.addColorStop(0.4,'rgba('+rr+','+gg+','+bb2+','+(a*0.45).toFixed(3)+')');
          g.addColorStop(1,'rgba('+rr+','+gg+','+bb2+',0)');
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px[j],py[j],r,0,Math.PI*2); ctx.fill();
        }
      }
    }

    function start() {
      if (running) return;
      running = true;
      lastT = 0;
      // prime with a few frames of trail so it never starts empty
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#05070f';
      ctx.fillRect(0, 0, W, H);
      rafId = requestAnimationFrame(step);
    }
    function stop() {
      running = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
    }

    /* ---- reduced motion: one gorgeous frozen frame, no loop ---- */
    if (reduce) {
      renderStaticFrame();
      // do NOT start rAF
    } else {
      start();
    }

    /* ---- resize (debounced via rAF) ---- */
    var resizeQueued = false;
    window.addEventListener('resize', function () {
      if (resizeQueued) return;
      resizeQueued = true;
      requestAnimationFrame(function () {
        resizeQueued = false;
        resize();
        // recompute count target; keep arrays but re-seed positions to fill new area
        if (reduce) renderStaticFrame();
      });
    });

    /* ---- lifecycle cleanup: pause when hidden, resume when visible ---- */
    function onVis() {
      if (reduce) return;
      if (document.hidden) stop();
      else start();
    }
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('pagehide', stop);
    window.addEventListener('beforeunload', stop);
  })();

  /* ================================================================
     FOREGROUND PROGRESS DRIVER — standalone preview only.
     In the real app, React drives --boot-fill and .done on the chips.
     (Kept inside the same single <script> block.)
     ================================================================ */
  (function () {
    var root  = document.documentElement;
    var chips = [document.getElementById('chip-1'), document.getElementById('chip-2')];
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function set(v) { root.style.setProperty('--boot-fill', String(v)); }
    set(0.18);
    if (reduce) { set(0.94); chips.forEach(function (c) { c.classList.add('done'); }); return; }
    setTimeout(function () { set(0.46); }, 700);
    setTimeout(function () { set(0.72); chips[0].classList.add('done'); }, 1700);
    setTimeout(function () { set(0.94); chips[1].classList.add('done'); }, 2900);
  })();
  </script>
</body>
</html>
