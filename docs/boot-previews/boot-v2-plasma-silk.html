<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vintrace — Opening (Plasma Silk)</title>
<style>
  /* ============================================================
     "PLASMA SILK" — a WebGL1 domain-warped fbm gradient.
     A GLSL ES 1.00 fragment shader on a full-screen triangle,
     driven by uTime via requestAnimationFrame. Fractal Brownian
     motion + double domain-warp folds slowly through a curated
     multi-hue ramp (deep teal -> electric blue -> indigo ->
     violet -> magenta, with rare warm amber/rose at flow peaks).
     Luminous liquid silk, endlessly folding. Film grain + soft
     vignette for depth; ordered-dither to kill banding.

     The foreground (frosted card + mark + progress + chips) sits
     above on a tasteful glass scrim so the colour breathes
     through while staying legible. Motion is transform/opacity
     only; the progress bar drives scaleX. Falls back to a rich
     animated CSS mesh gradient if WebGL is unavailable, and
     freezes to one gorgeous static frame under reduced-motion.
     ============================================================ */
  :root {
    --text: #fbfbff;
    --text-72: rgba(251, 251, 255, 0.74);
    --text-56: rgba(251, 251, 255, 0.58);
    --text-40: rgba(251, 251, 255, 0.42);
    --cyan: #7fe3ff;
    --magenta: #ff8ad8;
    --amber: #ffd08a;
    --ease-soft: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-inout: cubic-bezier(0.4, 0, 0.2, 1);
    --boot-fill: 0.18;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    /* deep ink base so first paint (before the shader compiles) is never black */
    background: radial-gradient(130% 110% at 50% 36%, #142036 0%, #0a1020 52%, #050812 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    isolation: isolate;
  }

  /* ---------- THE LIVING BACKGROUND (WebGL canvas) ---------- */
  #gl {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -3;
    display: block;
    /* fade the shader in once the first frame paints (set by JS) */
    opacity: 0;
    transition: opacity 1.1s var(--ease-inout);
  }
  #gl.ready { opacity: 1; }

  /* ---------- CSS FALLBACK MESH (rich animated gradient) ----------
     Shown only if WebGL fails — animates background-position (cheap,
     non-layout) across a curated multi-hue mesh so it is never blank
     or static-ugly. Hidden by default; .no-webgl on <html> reveals it. */
  .fallback {
    position: fixed;
    inset: 0;
    z-index: -3;
    display: none;
    pointer-events: none;
    background-color: #0a1020;
    background-image:
      radial-gradient(42% 52% at 22% 30%, rgba(0, 196, 204, 0.55) 0%, rgba(0, 196, 204, 0) 60%),
      radial-gradient(46% 56% at 78% 26%, rgba(58, 92, 255, 0.55) 0%, rgba(58, 92, 255, 0) 62%),
      radial-gradient(50% 58% at 64% 76%, rgba(160, 70, 240, 0.55) 0%, rgba(160, 70, 240, 0) 64%),
      radial-gradient(44% 54% at 26% 78%, rgba(255, 90, 190, 0.42) 0%, rgba(255, 90, 190, 0) 62%),
      radial-gradient(38% 46% at 50% 50%, rgba(255, 196, 130, 0.20) 0%, rgba(255, 196, 130, 0) 60%),
      linear-gradient(130deg, #0b1226 0%, #0a0f20 60%, #060912 100%);
    background-size: 200% 200%, 220% 220%, 210% 210%, 230% 230%, 180% 180%, 100% 100%;
    background-position: 0% 50%, 100% 40%, 50% 100%, 0% 100%, 50% 50%, 0 0;
    animation: meshFlow 26s var(--ease-inout) infinite alternate;
  }
  @keyframes meshFlow {
    0%   { background-position:  0%  50%, 100%  40%,  50% 100%,   0% 100%, 40% 50%, 0 0; }
    50%  { background-position: 70%  30%,  30%  70%,  20%  40%,  80%  20%, 60% 40%, 0 0; }
    100% { background-position: 100% 60%,   0%  20%,  80%  10%,  40%  60%, 30% 60%, 0 0; }
  }
  html.no-webgl .fallback { display: block; }
  html.no-webgl #gl { display: none; }

  /* faint static vignette over everything for depth & focus */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(135% 100% at 50% 42%, transparent 40%, rgba(3, 5, 12, 0.42) 100%),
      radial-gradient(80% 60% at 50% -10%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
  }

  /* ---------- FROSTED CARD (glass scrim so colour breathes through) ---------- */
  .card {
    position: relative;
    width: 392px;
    max-width: calc(100vw - 48px);
    padding: 42px 40px 34px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(20, 26, 44, 0.42) 0%, rgba(12, 16, 30, 0.30) 100%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
    backdrop-filter: blur(22px) saturate(150%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.14) inset,
      0 0 0 1px rgba(0, 0, 0, 0.18),
      0 36px 90px -22px rgba(0, 0, 0, 0.62),
      0 10px 28px -14px rgba(0, 0, 0, 0.5);
    text-align: center;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 16px, 0) scale(0.984);
    animation: cardIn 1.05s var(--ease-soft) 0.06s forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }

  /* hairline inner top highlight (masked rim — the "lit glass edge") */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0) 34%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* ---------- MARK ---------- */
  .mark {
    position: relative;
    width: 58px;
    height: 58px;
    margin: 4px auto 26px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    background: linear-gradient(160deg, #2a9bff 0%, #1f6fff 46%, #6a4dff 100%);
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.48) inset,
      0 -1px 1px rgba(20, 10, 80, 0.5) inset,
      0 12px 26px -8px rgba(90, 80, 255, 0.55),
      0 2px 6px rgba(0, 0, 0, 0.4);
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0) scale(0.9);
    animation:
      markIn 0.95s var(--ease-soft) 0.2s forwards,
      markBreathe 4.8s var(--ease-inout) 1.4s infinite;
  }
  @keyframes markIn  { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }
  @keyframes markBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

  /* top specular highlight on the badge (jewel-like, static) */
  .mark::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: radial-gradient(120% 80% at 50% 0%, rgba(255, 255, 255, 0.34), transparent 62%);
    pointer-events: none;
  }
  .mark svg { position: relative; z-index: 1; display: block; }

  /* ---------- TEXT ---------- */
  .name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.85s var(--ease-soft) 0.32s forwards;
  }
  .status {
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--text-72);
    margin: 0 0 5px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.85s var(--ease-soft) 0.4s forwards;
  }
  /* live status dot — pulses (transform + opacity), the "is-alive" tell on the glass */
  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 9px rgba(127, 227, 255, 0.9);
    will-change: transform, opacity;
    animation: dotPulse 1.9s var(--ease-inout) infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.45; transform: scale(0.82); }
    50%      { opacity: 1;    transform: scale(1); }
  }
  .sub {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: var(--text-56);
    margin: 0 0 26px;
    min-height: 15px;
    opacity: 0;
    will-change: transform, opacity;
    transform: translate3d(0, 8px, 0);
    animation: textIn 0.85s var(--ease-soft) 0.48s forwards;
  }
  @keyframes textIn { to { opacity: 1; transform: translate3d(0, 0, 0); } }

  /* ---------- PROGRESS (scaleX via transform — the one allowed exception) ---------- */
  .progress {
    position: relative;
    height: 4px;
    width: 100%;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    opacity: 0;
    animation: textIn 0.85s var(--ease-soft) 0.56s forwards;
  }
  .progress .fill {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    border-radius: 999px;
    background: linear-gradient(90deg, #2a9bff 0%, #7fe3ff 48%, #ff8ad8 100%);
    box-shadow: 0 0 14px rgba(127, 227, 255, 0.5);
    will-change: transform;
    transform: scaleX(var(--boot-fill, 0.18));
    transition: transform 1.1s var(--ease-soft);
  }
  /* a thin moving glint riding the fill — pure transform, sells "alive" */
  .progress .glint {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 38%;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
    will-change: transform;
    transform: translateX(-120%);
    animation: glint 2.6s var(--ease-inout) infinite;
  }
  @keyframes glint {
    0%   { transform: translateX(-130%); }
    60%  { transform: translateX(320%); }
    100% { transform: translateX(320%); }
  }

  /* ---------- STEP CHIPS ---------- */
  .chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 22px;
    opacity: 0;
    animation: textIn 0.85s var(--ease-soft) 0.64s forwards;
  }
  .chip {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text-40);
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.09);
    background: rgba(255, 255, 255, 0.04);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.5s var(--ease-inout), border-color 0.5s var(--ease-inout), background-color 0.5s var(--ease-inout);
  }
  .chip .tick {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.45;
    transform: scale(0.7);
    transition: opacity 0.5s var(--ease-inout), transform 0.5s var(--ease-soft);
  }
  .chip.done {
    color: var(--cyan);
    border-color: rgba(127, 227, 255, 0.34);
    background: rgba(60, 120, 255, 0.16);
  }
  .chip.done .tick { opacity: 1; transform: scale(1); }

  /* ---------- ERROR STATE ---------- */
  .boot-failed .status .dot {
    background: #ff6b62;
    box-shadow: 0 0 9px rgba(255, 107, 98, 0.7);
    animation: none;
    opacity: 1;
  }
  .boot-failed .progress .glint { display: none; }
  .boot-failed .progress .fill { background: linear-gradient(90deg, #ff453a, #ff9f0a); }

  /* ---------- REDUCED MOTION: freeze to one gorgeous static frame ----------
     JS renders a single shader frame then stops the rAF loop. We also calm
     the CSS: the foreground appears immediately; the dot pulses very slowly. */
  @media (prefers-reduced-motion: reduce) {
    .fallback { animation: none; background-position: 30% 40%, 70% 35%, 55% 75%, 25% 70%, 50% 50%, 0 0; }
    .mark { animation: markIn 0.6s var(--ease-soft) forwards; }
    .status .dot { animation: dotPulse 3s var(--ease-inout) infinite; }
    .progress .glint { display: none; }
    .card, .name, .status, .sub, .progress, .chips {
      opacity: 1;
      transform: none;
      animation: none;
    }
  }
</style>
</head>
<body>
  <div class="stage boot">
    <canvas id="gl" aria-hidden="true"></canvas>
    <div class="fallback" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="card" role="status" aria-live="polite" aria-label="Opening Vintrace">
      <div class="mark" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6 L15 23 L25 6" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1 class="name">Vintrace</h1>
      <p class="status"><span class="dot"></span><span id="status-text">Opening app</span></p>
      <p class="sub">Loading private on-device review data.</p>

      <div class="progress" aria-hidden="true">
        <div class="fill" id="fill"><span class="glint"></span></div>
      </div>

      <div class="chips" aria-hidden="true">
        <span class="chip done" id="chip-0"><span class="tick"></span>Shell</span>
        <span class="chip" id="chip-1"><span class="tick"></span>Engine</span>
        <span class="chip" id="chip-2"><span class="tick"></span>App folder</span>
      </div>
    </main>
  </div>

  <script>
  /* ====================================================================
     PLASMA SILK shader engine.
     WebGL1 + GLSL ES 1.00. Full-screen triangle, single fragment shader.
     ==================================================================== */
  (function () {
    "use strict";

    var canvas = document.getElementById("gl");
    var html = document.documentElement;
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var DPR_CAP = 2;

    // ---- vertex shader: a single oversized triangle covering the screen ----
    var VERT = [
      "attribute vec2 aPos;",
      "void main() {",
      "  gl_Position = vec4(aPos, 0.0, 1.0);",
      "}"
    ].join("\n");

    // ---- fragment shader: domain-warped fbm -> curated multi-hue silk ----
    var FRAG = [
      "precision highp float;",
      "uniform vec2  uRes;",
      "uniform float uTime;",
      "",
      "// --- value noise (smooth, cheap) ---",
      "float hash(vec2 p){",
      "  p = fract(p * vec2(123.34, 456.21));",
      "  p += dot(p, p + 45.32);",
      "  return fract(p.x * p.y);",
      "}",
      "float noise(vec2 p){",
      "  vec2 i = floor(p);",
      "  vec2 f = fract(p);",
      "  vec2 u = f * f * (3.0 - 2.0 * f);", // smoothstep weights
      "  float a = hash(i + vec2(0.0, 0.0));",
      "  float b = hash(i + vec2(1.0, 0.0));",
      "  float c = hash(i + vec2(0.0, 1.0));",
      "  float d = hash(i + vec2(1.0, 1.0));",
      "  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);",
      "}",
      "// --- fractal Brownian motion: 5 octaves, rotated each step ---",
      "float fbm(vec2 p){",
      "  float v = 0.0;",
      "  float amp = 0.5;",
      "  mat2 rot = mat2(0.80, 0.60, -0.60, 0.80);",
      "  for (int i = 0; i < 5; i++){",
      "    v += amp * noise(p);",
      "    p = rot * p * 2.0 + 0.03;",
      "    amp *= 0.5;",
      "  }",
      "  return v;",
      "}",
      "",
      "// curated silk ramp: teal -> electric blue -> indigo -> violet -> magenta",
      "vec3 palette(float t){",
      "  t = clamp(t, 0.0, 1.0);",
      "  vec3 teal    = vec3(0.04, 0.42, 0.50);",
      "  vec3 blue    = vec3(0.10, 0.36, 0.92);",
      "  vec3 indigo  = vec3(0.30, 0.20, 0.78);",
      "  vec3 violet  = vec3(0.55, 0.22, 0.80);",
      "  vec3 magenta = vec3(0.92, 0.32, 0.70);",
      "  vec3 col;",
      "  if (t < 0.25)      col = mix(teal,   blue,    smoothstep(0.0,  0.25, t));",
      "  else if (t < 0.5)  col = mix(blue,   indigo,  smoothstep(0.25, 0.5,  t));",
      "  else if (t < 0.75) col = mix(indigo, violet,  smoothstep(0.5,  0.75, t));",
      "  else               col = mix(violet, magenta, smoothstep(0.75, 1.0,  t));",
      "  return col;",
      "}",
      "",
      "// ordered 8x8 Bayer dither -> kills gradient banding on 8-bit displays",
      "float bayer(vec2 fragcoord){",
      "  vec2 p = floor(mod(fragcoord, 4.0));",
      "  int idx = int(p.x) + int(p.y) * 4;",
      "  float m = 0.0;",
      "  if(idx==0) m=0.0;   else if(idx==1) m=8.0;  else if(idx==2) m=2.0;  else if(idx==3) m=10.0;",
      "  else if(idx==4) m=12.0; else if(idx==5) m=4.0; else if(idx==6) m=14.0; else if(idx==7) m=6.0;",
      "  else if(idx==8) m=3.0;  else if(idx==9) m=11.0; else if(idx==10) m=1.0; else if(idx==11) m=9.0;",
      "  else if(idx==12) m=15.0; else if(idx==13) m=7.0; else if(idx==14) m=13.0; else m=5.0;",
      "  return (m / 16.0) - 0.5;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / uRes.xy;",
      "  // aspect-correct, centered coords",
      "  vec2 p = (gl_FragCoord.xy - 0.5 * uRes.xy) / uRes.y;",
      "  float t = uTime * 0.06;",
      "",
      "  // --- DOMAIN WARP (two folds): fbm of fbm of fbm = liquid silk ---",
      "  vec2 q = vec2(",
      "    fbm(p * 1.6 + vec2(0.0, t)),",
      "    fbm(p * 1.6 + vec2(5.2, -t * 0.8))",
      "  );",
      "  vec2 r = vec2(",
      "    fbm(p * 1.6 + 3.0 * q + vec2(1.7, 9.2) + t * 0.5),",
      "    fbm(p * 1.6 + 3.0 * q + vec2(8.3, 2.8) - t * 0.4)",
      "  );",
      "  float f = fbm(p * 1.6 + 3.5 * r + t * 0.3);",
      "",
      "  // map the folded field into the curated ramp; q/r add slow hue travel",
      "  float hue = f + 0.28 * length(q) + 0.16 * r.x + 0.06 * sin(t * 1.3);",
      "  vec3 col = palette(fract(hue));",
      "",
      "  // depth shading: peaks of the flow glow, troughs sink (adds 3D fold feel)",
      "  float shade = smoothstep(0.1, 1.0, f);",
      "  col *= 0.55 + 0.85 * shade;",
      "",
      "  // RARE warm highlight where the fold crests hardest (amber/rose), masked tight",
      "  float crest = smoothstep(0.72, 0.96, f) * smoothstep(0.55, 0.9, length(r));",
      "  vec3 warm = mix(vec3(1.0, 0.62, 0.32), vec3(1.0, 0.42, 0.55), r.x);",
      "  col = mix(col, warm, crest * 0.55);",
      "",
      "  // luminous lift + gentle saturation so it reads as light, not paint",
      "  col += 0.06 * vec3(0.4, 0.6, 1.0) * shade;",
      "  float lum = dot(col, vec3(0.299, 0.587, 0.114));",
      "  col = mix(vec3(lum), col, 1.16);",
      "",
      "  // soft radial vignette baked in for depth",
      "  float vig = smoothstep(1.35, 0.25, length(p));",
      "  col *= 0.5 + 0.5 * vig;",
      "",
      "  // film grain (animated) — subtle, keeps it from feeling flat/CG",
      "  float grain = hash(gl_FragCoord.xy + fract(uTime) * 91.7) - 0.5;",
      "  col += grain * 0.025;",
      "",
      "  // ordered dither in the last bit to defeat 8-bit banding",
      "  col += bayer(gl_FragCoord.xy) * (1.5 / 255.0);",
      "",
      "  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);",
      "}"
    ].join("\n");

    var gl = null;
    try {
      var opts = { antialias: false, alpha: false, depth: false, stencil: false, preserveDrawingBuffer: false, powerPreference: "low-power" };
      gl = canvas.getContext("webgl", opts) || canvas.getContext("experimental-webgl", opts);
    } catch (e) { gl = null; }

    if (!gl) {
      // graceful fallback: rich animated CSS mesh, never a black screen
      html.classList.add("no-webgl");
      return;
    }

    function compile(type, src) {
      var sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
        gl.deleteShader(sh);
        return null;
      }
      return sh;
    }

    var vs = compile(gl.VERTEX_SHADER, VERT);
    var fs = compile(gl.FRAGMENT_SHADER, FRAG);
    var prog = vs && fs ? gl.createProgram() : null;
    if (prog) {
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) prog = null;
    }
    if (!prog) {
      // shader failed to build -> fall back to CSS mesh
      html.classList.add("no-webgl");
      return;
    }

    gl.useProgram(prog);

    // full-screen triangle (covers clip space with one tri = fewer verts)
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    var aPos = gl.getAttribLocation(prog, "aPos");
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "uRes");
    var uTime = gl.getUniformLocation(prog, "uTime");

    var width = 0, height = 0;
    function resize() {
      var dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
      var w = Math.max(1, Math.round(window.innerWidth * dpr));
      var h = Math.max(1, Math.round(window.innerHeight * dpr));
      if (w === width && h === height) return;
      width = w; height = h;
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, w, h);
    }

    var raf = 0;
    var running = false;
    var contextLost = false;
    var startT = (typeof performance !== "undefined" ? performance.now() : Date.now());

    function renderOnce(nowMs) {
      if (contextLost) return;
      gl.uniform1f(uTime, (nowMs - startT) / 1000);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      if (!canvas.classList.contains("ready")) canvas.classList.add("ready");
    }

    function loop(now) {
      if (!running) return;
      renderOnce(now);
      raf = window.requestAnimationFrame(loop);
    }

    function start() {
      if (running || contextLost) return;
      running = true;
      raf = window.requestAnimationFrame(loop);
    }
    function stop() {
      running = false;
      if (raf) { window.cancelAnimationFrame(raf); raf = 0; }
    }

    resize();
    window.addEventListener("resize", function () {
      resize();
      // if frozen (reduced motion), re-render the single frame at the new size
      if (!running && !contextLost) renderOnce(performance.now ? performance.now() : Date.now());
    });

    // ---- context-loss handling: keep the screen graceful ----
    canvas.addEventListener("webglcontextlost", function (ev) {
      ev.preventDefault();
      contextLost = true;
      stop();
      // reveal CSS mesh underneath so it never goes black
      html.classList.add("no-webgl");
    }, false);

    // ---- lifecycle cleanup: stop rAF + lose context on hide ----
    function teardown() {
      stop();
      var ext = gl.getExtension("WEBGL_lose_context");
      if (ext) { try { ext.loseContext(); } catch (e) {} }
    }
    window.addEventListener("pagehide", teardown, false);
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) stop();
      else if (!reduce && !contextLost) start();
    }, false);

    if (reduce) {
      // freeze: render exactly ONE gorgeous static frame, no loop
      renderOnce(startT + 6200); // a hand-picked time offset with pleasing folds
    } else {
      start();
    }
  })();

  /* ====================================================================
     Standalone preview driver. The real app drives --boot-fill and the
     .done chip classes / #status-text from React boot state instead.
     ==================================================================== */
  (function () {
    "use strict";
    var root = document.documentElement;
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var chips = [document.getElementById("chip-1"), document.getElementById("chip-2")];
    function set(v) { root.style.setProperty("--boot-fill", String(v)); }
    set(0.18);
    if (reduce) {
      set(0.94);
      chips.forEach(function (c) { if (c) c.classList.add("done"); });
      return;
    }
    setTimeout(function () { set(0.46); }, 750);
    setTimeout(function () { set(0.72); if (chips[0]) chips[0].classList.add("done"); }, 1750);
    setTimeout(function () { set(0.94); if (chips[1]) chips[1].classList.add("done"); }, 3050);
  })();
  </script>
</body>
</html>
